<!doctype html>
  <html lang="en">
  <head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Golden Hour Meadow</title>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" />
  <style>
    :root {
      --dusk: #2b1a3d;
      --violet: #5b3763;
      --rose: #b45a71;
      --amber: #e8925a;
      --gold: #f7c064;
      --cream: #ffe9bf;
    }
  
    * { margin: 0; padding: 0; box-sizing: border-box; }
  
    html, body {
      height: 100%;
      overflow: hidden;
      font-family: Georgia, 'Times New Roman', serif;
    }
  
    .scene {
      position: fixed;
      inset: 0;
      background: linear-gradient(
        to bottom,
        var(--dusk) 0%,
        var(--violet) 22%,
        var(--rose) 44%,
        var(--amber) 62%,
        var(--gold) 76%,
        var(--cream) 92%
      );
    }
  
    /* ---------- Sun ---------- */
    .sun-glow {
      position: absolute;
      left: 50%;
      top: 62%;
      width: 90vmin;
      height: 90vmin;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle,
        rgba(255, 236, 179, 0.85) 0%,
        rgba(255, 210, 120, 0.45) 28%,
        rgba(255, 180, 90, 0.18) 52%,
        transparent 70%);
      border-radius: 50%;
      animation: breathe 9s ease-in-out infinite;
      pointer-events: none;
    }
  
    .sun {
      position: absolute;
      left: 50%;
      top: 62%;
      width: 22vmin;
      height: 22vmin;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle at 50% 42%, #fff7e0 0%, #ffe3a1 45%, #ffc36b 100%);
      border-radius: 50%;
      box-shadow:
        0 0 6vmin 2vmin rgba(255, 224, 150, 0.75),
        0 0 18vmin 6vmin rgba(255, 190, 110, 0.35);
      animation: breathe 9s ease-in-out infinite;
      pointer-events: none;
    }
  
    @keyframes breathe {
      0%, 100% { opacity: 0.95; transform: translate(-50%, -50%) scale(1); }
      50%       { opacity: 1;    transform: translate(-50%, -50%) scale(1.035); }
    }
  
    /* ---------- Clouds ---------- */
    .cloud {
      position: absolute;
      border-radius: 50%;
      filter: blur(14px);
      opacity: 0.55;
      pointer-events: none;
      animation: drift linear infinite;
    }
    .cloud.c1 { top: 14%; width: 34vw; height: 5vh; background: rgba(255, 190, 160, 0.5);  animation-duration: 95s;  }
    .cloud.c2 { top: 26%; width: 46vw; height: 6vh; background: rgba(255, 205, 150, 0.45); animation-duration: 130s; animation-delay: -40s; }
    .cloud.c3 { top: 36%; width: 28vw; height: 4.5vh; background: rgba(255, 225, 170, 0.5); animation-duration: 80s; animation-delay: -20s; }
    .cloud.c4 { top: 8%;  width: 22vw; height: 4vh; background: rgba(214, 150, 170, 0.4);  animation-duration: 150s; animation-delay: -75s; }
  
    @keyframes drift {
      from { transform: translateX(-50vw); }
      to   { transform: translateX(110vw); }
    }
  
    /* ---------- Hills ---------- */
    svg.hills {
      position: absolute;
      left: 0;
      width: 100%;
      pointer-events: none;
    }
    .hills-far  { bottom: 18%; height: 26%; }
    .hills-mid  { bottom: 8%;  height: 26%; }
    .hills-near { bottom: 0;   height: 26%; }
  
    /* ---------- Canvas layers ---------- */
    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
  
    /* ---------- Text ---------- */
    .content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 11vh;
      text-align: center;
      color: var(--cream);
      z-index: 5;
      pointer-events: none;
    }
  
    .content .eyebrow {
      font-size: clamp(0.7rem, 1.4vmin, 0.95rem);
      letter-spacing: 0.55em;
      text-transform: uppercase;
      opacity: 0;
      color: #ffd9a8;
      animation: fadeUp 2.2s ease 0.4s forwards;
    }
  
    .content h1 {
      margin-top: 2.2vh;
      font-size: clamp(2.6rem, 8vmin, 5.4rem);
      font-weight: 400;
      font-style: italic;
      letter-spacing: 0.06em;
      text-shadow: 0 2px 30px rgba(120, 60, 90, 0.45);
      opacity: 0;
      animation: fadeUp 2.2s ease 1s forwards;
    }
  
    .content p.sub {
      margin-top: 2vh;
      max-width: 34em;
      font-size: clamp(0.95rem, 2vmin, 1.15rem);
      line-height: 1.8;
      font-style: italic;
      color: rgba(255, 236, 205, 0.9);
      opacity: 0;
      animation: fadeUp 2.2s ease 1.7s forwards;
    }
  
    .divider {
      margin-top: 2.6vh;
      width: 5.5em;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(255, 226, 180, 0.8), transparent);
      opacity: 0;
      animation: fadeUp 2.2s ease 2.2s forwards;
    }
  
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  
    .footer {
      position: absolute;
      bottom: 2.4vh;
      width: 100%;
      text-align: center;
      z-index: 6;
      font-size: clamp(0.65rem, 1.3vmin, 0.85rem);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(58, 36, 24, 0.55);
      pointer-events: none;
    }
  </style>
  </head>
  <body>
    <div class="scene" id="scene">
      <div class="sun-glow"></div>
      <div class="sun"></div>
  
      <div class="cloud c1"></div>
      <div class="cloud c2"></div>
      <div class="cloud c3"></div>
      <div class="cloud c4"></div>
  
      <!-- birds -->
      <canvas id="birds"></canvas>
  
      <!-- rolling hills -->
      <svg class="hills hills-far" viewBox="0 0 1440 200" preserveAspectRatio="none">
        <path d="M0,120 C240,60 420,150 720,100 C1020,50 1200,140 1440,90 L1440,200 L0,200 Z"
              fill="#8a4a5e" opacity="0.85"/>
      </svg>
      <svg class="hills hills-mid" viewBox="0 0 1440 200" preserveAspectRatio="none">
        <path d="M0,110 C300,160 520,60 820,110 C1100,155 1280,80 1440,120 L1440,200 L0,200 Z"
              fill="#6b3450" opacity="0.9"/>
      </svg>
      <svg class="hills hills-near" viewBox="0 0 1440 200" preserveAspectRatio="none">
        <path d="M0,130 C260,90 540,150 860,105 C1140,70 1320,130 1440,105 L1440,200 L0,200 Z"
              fill="#46243f"/>
      </svg>
  
      <!-- grass + flowers + pollen -->
      <canvas id="meadow"></canvas>
  
      <div class="content">
        <div class="eyebrow">The Meadow</div>
        <h1>Golden Hour</h1>
        <p class="sub">Somewhere between day and dusk, the world exhales.
          The grass leans into the wind, the light turns to honey,
          and there is nothing at all that needs doing.</p>
        <div class="divider"></div>
      </div>
  
      <div class="footer">stay a while &nbsp;&middot;&nbsp; breathe</div>
    </div>
  
  <script>
  (() => {
    const meadow = document.getElementById('meadow');
    const birdsC = document.getElementById('birds');
    const mctx = meadow.getContext('2d');
    const bctx = birdsC.getContext('2d');
  
    let W = 0, H = 0, dpr = 1;
  
    // ---------- Grass ----------
    let blades = [];
    let flowers = [];
    let pollen = [];
  
    const rand = (a, b) => a + Math.random() * (b - a);
  
    function buildMeadow() {
      blades = [];
      flowers = [];
      pollen = [];
  
      const count = Math.floor(W / 3.2);
      for (let i = 0; i < count; i++) {
        const depth = Math.random();                 // 0 = far, 1 = near
        blades.push({
          x: Math.random() * W,
          len: rand(0.06, 0.10) * H + depth * 0.09 * H,
          width: 1 + depth * 2.2,
          lean: rand(-0.35, 0.35),
          phase: Math.random() * Math.PI * 2,
          speed: rand(0.4, 0.9),
          depth,
          hue: rand(0, 1),
          seedHead: Math.random() < 0.16
        });
      }
      blades.sort((a, b) => a.depth - b.depth);
  
      const fcount = Math.floor(W / 90);
      for (let i = 0; i < fcount; i++) {
        const depth = rand(0.4, 1);
        flowers.push({
          x: Math.random() * W,
          len: rand(0.07, 0.12) * H * (0.6 + depth * 0.5),
          phase: Math.random() * Math.PI * 2,
          depth,
          size: 3 + depth * 4,
          kind: Math.random() < 0.5 ? 'poppy' : 'daisy'
        });
      }
  
      const pcount = Math.floor(W / 22);
      for (let i = 0; i < pcount; i++) {
        pollen.push({
          x: Math.random() * W,
          y: rand(0.35, 0.98) * H,
          r: rand(0.8, 2.4),
          vx: rand(6, 22),
          wob: Math.random() * Math.PI * 2,
          wobSpeed: rand(0.3, 1.1),
          alpha: rand(0.25, 0.75)
        });
      }
    }
  
    function grassColor(b, t) {
      // silhouettes: deep plum far, warm umber near, gold-tipped
      const near = b.depth;
      const r = Math.round(46 + near * 40 + b.hue * 14);
      const g = Math.round(22 + near * 22 + b.hue * 10);
      const bl = Math.round(48 + near * 8);
      return `rgb(${r},${g},${bl})`;
    }
  
    function drawBlade(b, t) {
      const baseY = H;
      const sway = Math.sin(t * b.speed + b.phase) * (6 + b.depth * 14)
                 + Math.sin(t * 0.23 + b.x * 0.01) * 5; // slow gusts
      const tipX = b.x + b.lean * b.len + sway;
      const tipY = baseY - b.len;
      const ctrlX = b.x + b.lean * b.len * 0.3 + sway * 0.35;
      const ctrlY = baseY - b.len * 0.55;
  
      mctx.strokeStyle = grassColor(b, t);
      mctx.lineWidth = b.width;
      mctx.lineCap = 'round';
      mctx.beginPath();
      mctx.moveTo(b.x, baseY);
      mctx.quadraticCurveTo(ctrlX, ctrlY, tipX, tipY);
      mctx.stroke();
  
      if (b.seedHead) {
        mctx.fillStyle = `rgba(255, 214, 140, ${0.35 + b.depth * 0.4})`;
        mctx.beginPath();
        mctx.ellipse(tipX, tipY, b.width * 1.4, b.width * 3, sway * 0.01, 0, Math.PI * 2);
        mctx.fill();
      }
    }
  
    function drawFlower(f, t) {
      const baseY = H;
      const sway = Math.sin(t * 0.6 + f.phase) * (5 + f.depth * 10);
      const headX = f.x + sway;
      const headY = baseY - f.len;
  
      mctx.strokeStyle = `rgba(50, 30, 40, ${0.5 + f.depth * 0.4})`;
      mctx.lineWidth = 1.4;
      mctx.beginPath();
      mctx.moveTo(f.x, baseY);
      mctx.quadraticCurveTo(f.x + sway * 0.4, baseY - f.len * 0.5, headX, headY);
      mctx.stroke();
  
      if (f.kind === 'poppy') {
        mctx.fillStyle = `rgba(214, 78, 60, ${0.55 + f.depth * 0.35})`;
        mctx.beginPath();
        mctx.arc(headX, headY, f.size, 0, Math.PI * 2);
        mctx.fill();
        mctx.fillStyle = 'rgba(60, 30, 30, 0.8)';
        mctx.beginPath();
        mctx.arc(headX, headY, f.size * 0.32, 0, Math.PI * 2);
        mctx.fill();
      } else {
        mctx.fillStyle = `rgba(255, 240, 210, ${0.55 + f.depth * 0.35})`;
        for (let p = 0; p < 6; p++) {
          const a = (p / 6) * Math.PI * 2 + sway * 0.02;
          mctx.beginPath();
          mctx.ellipse(headX + Math.cos(a) * f.size * 0.8,
                       headY + Math.sin(a) * f.size * 0.8,
                       f.size * 0.55, f.size * 0.3, a, 0, Math.PI * 2);
          mctx.fill();
        }
        mctx.fillStyle = 'rgba(255, 190, 90, 0.9)';
        mctx.beginPath();
        mctx.arc(headX, headY, f.size * 0.38, 0, Math.PI * 2);
        mctx.fill();
      }
    }
  
    function drawPollen(dt, t) {
      for (const p of pollen) {
        p.x += p.vx * dt;
        p.wob += p.wobSpeed * dt;
        const y = p.y + Math.sin(p.wob) * 14;
        if (p.x > W + 10) { p.x = -10; p.y = rand(0.35, 0.98) * H; }
        const tw = 0.6 + 0.4 * Math.sin(t * 2 + p.wob * 3);
        mctx.fillStyle = `rgba(255, 226, 160, ${p.alpha * tw})`;
        mctx.beginPath();
        mctx.arc(p.x, y, p.r, 0, Math.PI * 2);
        mctx.fill();
      }
    }
  
    // ---------- Birds ----------
    let flocks = [];
    function spawnFlock() {
      const y = rand(0.08, 0.3) * H;
      const dir = Math.random() < 0.5 ? 1 : -1;
      const n = 2 + Math.floor(Math.random() * 4);
      const birds = [];
      for (let i = 0; i < n; i++) {
        birds.push({ ox: -i * rand(24, 46), oy: (i % 2 ? 1 : -1) * i * rand(6, 14), flap: Math.random() * Math.PI * 2 });
      }
      flocks.push({
        x: dir > 0 ? -80 : W + 80,
        y, dir,
        speed: rand(26, 44),
        birds
      });
    }
  
    function drawBirds(dt, t) {
      bctx.clearRect(0, 0, W, H);
      if (flocks.length < 2 && Math.random() < 0.003) spawnFlock();
  
      bctx.strokeStyle = 'rgba(62, 34, 58, 0.75)';
      bctx.lineWidth = 1.6;
      bctx.lineCap = 'round';
  
      flocks = flocks.filter(f => f.dir > 0 ? f.x < W + 140 : f.x > -140);
      for (const f of flocks) {
        f.x += f.speed * f.dir * dt;
        for (const b of f.birds) {
          b.flap += dt * 7;
          const x = f.x + b.ox * f.dir;
          const y = f.y + b.oy + Math.sin(t + b.ox) * 3;
          const w = 7, lift = 3 + Math.sin(b.flap) * 3;
          bctx.beginPath();
          bctx.moveTo(x - w, y);
          bctx.quadraticCurveTo(x - w * 0.4, y - lift, x, y);
          bctx.quadraticCurveTo(x + w * 0.4, y - lift, x + w, y);
          bctx.stroke();
        }
      }
    }
  
    // ---------- Loop ----------
    let last = performance.now();
    function frame(now) {
      const dt = Math.min((now - last) / 1000, 0.05);
      last = now;
      const t = now / 1000;
  
      mctx.clearRect(0, 0, W, H);
      drawPollen(dt, t);
      for (const b of blades) drawBlade(b, t);
      for (const f of flowers) drawFlower(f, t);
      drawBirds(dt, t);
  
      requestAnimationFrame(frame);
    }
  
    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      W = window.innerWidth;
      H = window.innerHeight;
      for (const c of [meadow, birdsC]) {
        c.width = W * dpr;
        c.height = H * dpr;
        c.getContext('2d').setTransform(dpr, 0, 0, dpr, 0, 0);
      }
      buildMeadow();
    }
  
    window.addEventListener('resize', resize);
    resize();
    spawnFlock();
    requestAnimationFrame(frame);
  })();
  </script>
  </body>
  </html>
