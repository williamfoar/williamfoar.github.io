  <!doctype html>
  <html lang="en">
  <head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Maze Master</title>
  <style>
    :root {
      --bg-0: #07090f;
      --bg-1: #0d1120;
      --panel: rgba(255, 255, 255, 0.045);
      --panel-border: rgba(255, 255, 255, 0.09);
      --text: #e8ecf5;
      --muted: #8b93ab;
      --accent-a: #7c5cff;
      --accent-b: #00d4ff;
      --gold: #ffc857;
      --green: #3ddc97;
      --danger: #ff6b81;
    }
  
    * { box-sizing: border-box; margin: 0; padding: 0; }
  
    html, body { height: 100%; }
  
    body {
      font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
      background:
        radial-gradient(1100px 700px at 15% -10%, rgba(124, 92, 255, 0.16), transparent 60%),
        radial-gradient(900px 600px at 110% 110%, rgba(0, 212, 255, 0.12), transparent 60%),
        linear-gradient(160deg, var(--bg-1), var(--bg-0));
      color: var(--text);
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px 28px;
      -webkit-tap-highlight-color: transparent;
    }
  
    .shell { width: 100%; max-width: 980px; display: flex; flex-direction: column; gap: 14px; }
  
    /* ── Top bar ─────────────────────────── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; flex-wrap: wrap;
    }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand .logo {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
      display: grid; place-items: center;
      box-shadow: 0 4px 18px rgba(124, 92, 255, 0.45);
    }
    .brand .logo svg { width: 20px; height: 20px; }
    .brand h1 {
      font-size: 19px; font-weight: 700; letter-spacing: -0.02em;
    }
    .brand h1 span {
      background: linear-gradient(90deg, var(--accent-a), var(--accent-b));
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
  
    .stats { display: flex; gap: 8px; }
    .stat {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      padding: 7px 14px;
      min-width: 86px;
      text-align: center;
      backdrop-filter: blur(8px);
    }
    .stat .label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--muted); margin-bottom: 2px;
    }
    .stat .value {
      font-size: 16px; font-weight: 700; font-variant-numeric: tabular-nums;
    }
  
    /* ── Controls ────────────────────────── */
    .controls {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      padding: 10px 12px;
      backdrop-filter: blur(8px);
    }
  
    .seg { display: flex; background: rgba(0,0,0,0.28); border-radius: 10px; padding: 3px; gap: 2px; }
    .seg button {
      border: 0; background: transparent; color: var(--muted);
      font: inherit; font-size: 12.5px; font-weight: 600;
      padding: 6px 13px; border-radius: 8px; cursor: pointer;
      transition: color .18s, background .18s;
    }
    .seg button:hover { color: var(--text); }
    .seg button.active {
      color: #fff;
      background: linear-gradient(135deg, var(--accent-a), #5b8cff);
      box-shadow: 0 2px 10px rgba(124, 92, 255, 0.4);
    }
  
    .spacer { flex: 1; }
  
    .btn {
      border: 1px solid var(--panel-border);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      font: inherit; font-size: 13px; font-weight: 600;
      padding: 8px 16px; border-radius: 10px; cursor: pointer;
      display: inline-flex; align-items: center; gap: 7px;
      transition: transform .12s, background .18s, box-shadow .18s, opacity .18s;
    }
    .btn:hover { background: rgba(255,255,255,0.11); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.4; cursor: default; transform: none; }
    .btn svg { width: 15px; height: 15px; }
  
    .btn.primary {
      border: 0;
      background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
      color: #fff;
      box-shadow: 0 4px 16px rgba(60, 130, 255, 0.35);
    }
    .btn.primary:hover { box-shadow: 0 6px 22px rgba(60, 130, 255, 0.5); }
  
    .btn.hint { color: var(--gold); }
    .btn.giveup { color: var(--danger); }
  
    /* ── Maze board ──────────────────────── */
    .board {
      position: relative;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 20px;
      padding: 14px;
      backdrop-filter: blur(8px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    }
    canvas { display: block; width: 100%; height: auto; border-radius: 10px; touch-action: none; }
  
    .hint-toast {
      position: absolute; top: 22px; left: 50%; transform: translateX(-50%) translateY(-6px);
      background: rgba(15, 18, 32, 0.92);
      border: 1px solid rgba(255, 200, 87, 0.35);
      color: var(--gold);
      font-size: 12.5px; font-weight: 600;
      padding: 8px 16px; border-radius: 99px;
      opacity: 0; pointer-events: none;
      transition: opacity .3s, transform .3s;
      backdrop-filter: blur(6px);
      white-space: nowrap;
    }
    .hint-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  
    .help {
      text-align: center; font-size: 12px; color: var(--muted); letter-spacing: 0.02em;
    }
    .help kbd {
      font-family: inherit; font-size: 11px; font-weight: 700;
      background: rgba(255,255,255,0.08); border: 1px solid var(--panel-border);
      border-bottom-width: 2px; border-radius: 5px; padding: 1px 6px;
    }
  
    /* ── Mobile D-pad ────────────────────── */
    .dpad {
      display: none;
      grid-template-columns: repeat(3, 56px);
      grid-template-rows: repeat(3, 56px);
      gap: 6px;
      margin: 4px auto 0;
      user-select: none;
    }
    .dpad button {
      border: 1px solid var(--panel-border);
      background: rgba(255,255,255,0.06);
      color: var(--text); border-radius: 14px; cursor: pointer;
      font-size: 20px; display: grid; place-items: center;
    }
    .dpad button:active { background: rgba(124, 92, 255, 0.35); }
    .dpad .u { grid-area: 1 / 2; } .dpad .l { grid-area: 2 / 1; }
    .dpad .d { grid-area: 3 / 2; } .dpad .r { grid-area: 2 / 3; }
    @media (pointer: coarse) { .dpad { display: grid; } }
  
    /* ── Win overlay ─────────────────────── */
    .overlay {
      position: absolute; inset: 0; border-radius: 20px;
      display: grid; place-items: center;
      background: rgba(7, 9, 15, 0.72);
      backdrop-filter: blur(6px);
      opacity: 0; pointer-events: none;
      transition: opacity .35s;
      z-index: 5;
    }
    .overlay.show { opacity: 1; pointer-events: auto; }
    .win-card {
      text-align: center;
      background: linear-gradient(165deg, rgba(30, 34, 55, 0.95), rgba(16, 19, 34, 0.95));
      border: 1px solid var(--panel-border);
      border-radius: 22px;
      padding: 34px 44px;
      box-shadow: 0 24px 70px rgba(0,0,0,0.6);
      transform: scale(0.92);
      transition: transform .35s cubic-bezier(.2, 1.4, .4, 1);
    }
    .overlay.show .win-card { transform: scale(1); }
    .win-card .emoji { font-size: 44px; margin-bottom: 8px; }
    .win-card h2 {
      font-size: 24px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 4px;
      background: linear-gradient(90deg, var(--gold), var(--green));
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .win-card p { color: var(--muted); font-size: 13px; margin-bottom: 18px; }
    .win-card .win-stats {
      display: flex; gap: 10px; justify-content: center; margin-bottom: 22px;
    }
    .win-card .stat { min-width: 92px; }
  
    /* confetti */
    .confetti { position: absolute; inset: 0; pointer-events: none; overflow: hidden; border-radius: 20px; z-index: 4; }
    .confetti i {
      position: absolute; top: -12px; width: 8px; height: 12px; border-radius: 2px;
      animation: fall linear forwards;
    }
    @keyframes fall {
      to { transform: translateY(110vh) rotate(720deg); opacity: 0.2; }
    }
  </style>
  </head>
  <body>
  <div class="shell">
  
    <header>
      <div class="brand">
        <div class="logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round">
            <path d="M4 4h16M4 4v16M4 20h10M20 4v10M9 9h6M9 9v6M15 15h-3" />
          </svg>
        </div>
        <h1>Maze <span>Master</span></h1>
      </div>
      <div class="stats">
        <div class="stat"><div class="label">Time</div><div class="value" id="statTime">0:00</div></div>
        <div class="stat"><div class="label">Moves</div><div class="value" id="statMoves">0</div></div>
        <div class="stat"><div class="label">Hints</div><div class="value" id="statHints">0</div></div>
      </div>
    </header>
  
    <div class="controls">
      <div class="seg" id="difficulty">
        <button data-cols="15" data-rows="11" class="active">Easy</button>
        <button data-cols="25" data-rows="17">Medium</button>
        <button data-cols="37" data-rows="25">Hard</button>
        <button data-cols="51" data-rows="33">Insane</button>
      </div>
      <div class="spacer"></div>
      <button class="btn hint" id="btnHint" title="Reveal the next few steps">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18h6M10 21h4M12 3a6 6 0 0 0-3.6 10.8c.6.5 1.1 1.3 1.3 2.2h4.6c.2-.9.7-1.7 1.3-2.2A6 6 0 0 0 12 3z"/></svg>
        Hint
      </button>
      <button class="btn giveup" id="btnSolve" title="Stuck? Watch the maze solve itself">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 21V5a2 2 0 0 1 2-2h12l-3 4 3 4H6"/></svg>
        Give up &amp; solve
      </button>
      <button class="btn primary" id="btnNew">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-2.6-6.4M21 3v6h-6"/></svg>
        New maze
      </button>
    </div>
  
    <div class="board">
      <canvas id="maze"></canvas>
      <div class="hint-toast" id="hintToast">✨ A few steps revealed…</div>
      <div class="confetti" id="confetti"></div>
      <div class="overlay" id="overlay">
        <div class="win-card">
          <div class="emoji" id="winEmoji">🏆</div>
          <h2 id="winTitle">Maze conquered!</h2>
          <p id="winSub">You found the exit all by yourself.</p>
          <div class="win-stats">
            <div class="stat"><div class="label">Time</div><div class="value" id="winTime">0:00</div></div>
            <div class="stat"><div class="label">Moves</div><div class="value" id="winMoves">0</div></div>
            <div class="stat"><div class="label">Hints</div><div class="value" id="winHints">0</div></div>
          </div>
          <button class="btn primary" id="btnAgain">Play again</button>
        </div>
      </div>
    </div>
  
    <div class="dpad" id="dpad">
      <button class="u" data-dir="0">▲</button>
      <button class="l" data-dir="3">◀</button>
      <button class="r" data-dir="1">▶</button>
      <button class="d" data-dir="2">▼</button>
    </div>
  
    <p class="help">Move with <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> or <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> · swipe on touch · reach the glowing exit</p>
  </div>
  
  <script>
  (() => {
    'use strict';
  
    // ── DOM ──────────────────────────────────────────────
    const canvas   = document.getElementById('maze');
    const ctx      = canvas.getContext('2d');
    const elTime   = document.getElementById('statTime');
    const elMoves  = document.getElementById('statMoves');
    const elHints  = document.getElementById('statHints');
    const btnNew   = document.getElementById('btnNew');
    const btnHint  = document.getElementById('btnHint');
    const btnSolve = document.getElementById('btnSolve');
    const btnAgain = document.getElementById('btnAgain');
    const overlay  = document.getElementById('overlay');
    const hintToast = document.getElementById('hintToast');
    const confettiBox = document.getElementById('confetti');
  
    // ── State ────────────────────────────────────────────
    const DX = [0, 1, 0, -1];        // N E S W
    const DY = [-1, 0, 1, 0];
    const OPP = [2, 3, 0, 1];
  
    let cols = 15, rows = 11;
    let walls = [];                  // walls[y][x] = [N,E,S,W] booleans
    let genOrder = [];               // cell visit order for generation animation
    let genProgress = 0;             // cells revealed so far (during generation anim)
    let phase = 'generating';        // generating | playing | autosolving | won
  
    let player = { x: 0, y: 0, px: 0, py: 0 };  // cell coords + animated pixel coords
    let goal   = { x: 0, y: 0 };
    let trail  = [];                 // visited cells (player path history)
    let moves  = 0, hintsUsed = 0;
    let startTime = null, endTime = null;
  
    let hintPath = null, hintUntil = 0;   // temporary hint segment
    let solvePath = null, solveIdx = 0, solveTimer = 0; // auto-solve walk
    let assisted = false;
  
    let cell = 24, pad = 6;          // pixel metrics, computed on resize
  
    // ── Maze generation (recursive backtracker) ─────────
    function generate() {
      walls = Array.from({ length: rows }, () =>
        Array.from({ length: cols }, () => [true, true, true, true]));
      const seen = Array.from({ length: rows }, () => new Array(cols).fill(false));
      genOrder = [];
  
      const sx = Math.floor(Math.random() * cols);
      const sy = Math.floor(Math.random() * rows);
      const stack = [[sx, sy]];
      seen[sy][sx] = true;
      genOrder.push([sx, sy]);
  
      while (stack.length) {
        const [x, y] = stack[stack.length - 1];
        const nbrs = [];
        for (let d = 0; d < 4; d++) {
          const nx = x + DX[d], ny = y + DY[d];
          if (nx >= 0 && nx < cols && ny >= 0 && ny < rows && !seen[ny][nx]) nbrs.push(d);
        }
        if (!nbrs.length) { stack.pop(); continue; }
        const d = nbrs[Math.floor(Math.random() * nbrs.length)];
        const nx = x + DX[d], ny = y + DY[d];
        walls[y][x][d] = false;
        walls[ny][nx][OPP[d]] = false;
        seen[ny][nx] = true;
        genOrder.push([nx, ny]);
        stack.push([nx, ny]);
      }
  
      // sprinkle a few loops so hard mazes aren't strictly single-path
      const extra = Math.floor(cols * rows * 0.015);
      for (let i = 0; i < extra; i++) {
        const x = 1 + Math.floor(Math.random() * (cols - 2));
        const y = 1 + Math.floor(Math.random() * (rows - 2));
        const d = Math.floor(Math.random() * 4);
        const nx = x + DX[d], ny = y + DY[d];
        if (nx >= 0 && nx < cols && ny >= 0 && ny < rows) {
          walls[y][x][d] = false;
          walls[ny][nx][OPP[d]] = false;
        }
      }
    }
  
    // ── BFS solver ───────────────────────────────────────
    function bfs(fx, fy, tx, ty) {
      const prev = Array.from({ length: rows }, () => new Array(cols).fill(-1));
      prev[fy][fx] = -2;
      const q = [[fx, fy]];
      for (let h = 0; h < q.length; h++) {
        const [x, y] = q[h];
        if (x === tx && y === ty) break;
        for (let d = 0; d < 4; d++) {
          if (walls[y][x][d]) continue;
          const nx = x + DX[d], ny = y + DY[d];
          if (prev[ny][nx] !== -1) continue;
          prev[ny][nx] = OPP[d];
          q.push([nx, ny]);
        }
      }
      if (prev[ty][tx] === -1) return null;
      const path = [];
      let x = tx, y = ty;
      while (!(x === fx && y === fy)) {
        path.push([x, y]);
        const back = prev[y][x];
        x += DX[back]; y += DY[back];
      }
      path.push([fx, fy]);
      path.reverse();
      return path;
    }
  
    // ── Layout / rendering ───────────────────────────────
    function resize() {
      const maxW = canvas.parentElement.clientWidth - 28; // board padding
      cell = Math.max(10, Math.floor(maxW / cols));
      const w = cell * cols + pad * 2;
      const h = cell * rows + pad * 2;
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.round(w * dpr);
      canvas.height = Math.round(h * dpr);
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
  
    const cx = x => pad + x * cell + cell / 2;
    const cy = y => pad + y * cell + cell / 2;
  
    function drawPathLine(path, from, to, color, width, glow) {
      if (to - from < 1) return;
      ctx.save();
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      if (glow) { ctx.shadowColor = glow; ctx.shadowBlur = 12; }
      ctx.beginPath();
      ctx.moveTo(cx(path[from][0]), cy(path[from][1]));
      for (let i = from + 1; i <= to; i++) ctx.lineTo(cx(path[i][0]), cy(path[i][1]));
      ctx.stroke();
      ctx.restore();
    }
  
    function draw(now) {
      const w = cell * cols + pad * 2, h = cell * rows + pad * 2;
      ctx.clearRect(0, 0, w, h);
  
      // backdrop
      const bg = ctx.createLinearGradient(0, 0, w, h);
      bg.addColorStop(0, '#101426');
      bg.addColorStop(1, '#0a0d1a');
      ctx.fillStyle = bg;
      ctx.beginPath();
      ctx.roundRect(0, 0, w, h, 10);
      ctx.fill();
  
      const revealed = phase === 'generating' ? genProgress : genOrder.length;
  
      // generation shimmer: fill revealed cells subtly
      if (phase === 'generating') {
        ctx.fillStyle = 'rgba(124, 92, 255, 0.07)';
        for (let i = 0; i < revealed; i++) {
          const [x, y] = genOrder[i];
          ctx.fillRect(pad + x * cell, pad + y * cell, cell, cell);
        }
        // glowing head
        if (revealed > 0 && revealed < genOrder.length) {
          const [hx, hy] = genOrder[revealed - 1];
          ctx.save();
          ctx.fillStyle = 'rgba(0, 212, 255, 0.8)';
          ctx.shadowColor = '#00d4ff';
          ctx.shadowBlur = 14;
          ctx.beginPath();
          ctx.arc(cx(hx), cy(hy), Math.max(2.5, cell * 0.18), 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }
  
      // trail (player history)
      if (phase !== 'generating' && trail.length > 1) {
        drawPathLine(trail, 0, trail.length - 1, 'rgba(124, 92, 255, 0.32)', Math.max(3, cell * 0.28));
      }
  
      // hint segment
      if (hintPath && now < hintUntil) {
        const a = Math.min(1, (hintUntil - now) / 600);
        ctx.globalAlpha = a;
        drawPathLine(hintPath, 0, hintPath.length - 1, 'rgba(255, 200, 87, 0.9)', Math.max(3, cell * 0.2), '#ffc857');
        ctx.globalAlpha = 1;
      } else if (hintPath && now >= hintUntil) {
        hintPath = null;
      }
  
      // auto-solve path reveal
      if (solvePath) {
        drawPathLine(solvePath, 0, Math.min(solveIdx, solvePath.length - 1), 'rgba(61, 220, 151, 0.85)', Math.max(3, cell * 0.2), '#3ddc97');
      }
  
      // walls
      ctx.strokeStyle = 'rgba(190, 200, 235, 0.85)';
      ctx.lineWidth = Math.max(1.5, cell * 0.09);
      ctx.lineCap = 'round';
      ctx.beginPath();
      const upTo = phase === 'generating' ? revealed : genOrder.length;
      const shown = phase === 'generating'
        ? (() => { const s = new Set(); for (let i = 0; i < upTo; i++) s.add(genOrder[i][1] * cols + genOrder[i][0]); return s; })()
        : null;
      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          if (shown && !shown.has(y * cols + x)) continue;
          const L = pad + x * cell, T = pad + y * cell, R = L + cell, B = T + cell;
          const wl = walls[y][x];
          if (wl[0]) { ctx.moveTo(L, T); ctx.lineTo(R, T); }
          if (wl[3]) { ctx.moveTo(L, T); ctx.lineTo(L, B); }
          if (wl[2] && y === rows - 1) { ctx.moveTo(L, B); ctx.lineTo(R, B); }
          if (wl[1] && x === cols - 1) { ctx.moveTo(R, T); ctx.lineTo(R, B); }
        }
      }
      ctx.stroke();
  
      if (phase !== 'generating') {
        // goal: pulsing ring
        const pulse = 0.75 + 0.25 * Math.sin(now / 350);
        ctx.save();
        ctx.strokeStyle = 'rgba(61, 220, 151, 0.95)';
        ctx.shadowColor = '#3ddc97';
        ctx.shadowBlur = 16 * pulse;
        ctx.lineWidth = Math.max(2, cell * 0.1);
        ctx.beginPath();
        ctx.arc(cx(goal.x), cy(goal.y), cell * 0.26 * pulse + cell * 0.06, 0, Math.PI * 2);
        ctx.stroke();
        ctx.fillStyle = 'rgba(61, 220, 151, 0.5)';
        ctx.beginPath();
        ctx.arc(cx(goal.x), cy(goal.y), cell * 0.12, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
  
        // player: glowing orb (lerped position)
        const tx = cx(player.x), ty = cy(player.y);
        player.px += (tx - player.px) * 0.35;
        player.py += (ty - player.py) * 0.35;
        const grad = ctx.createRadialGradient(player.px, player.py, 1, player.px, player.py, cell * 0.34);
        grad.addColorStop(0, '#ffffff');
        grad.addColorStop(0.35, '#9fd8ff');
        grad.addColorStop(1, '#4d6bff');
        ctx.save();
        ctx.shadowColor = '#00d4ff';
        ctx.shadowBlur = 18;
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(player.px, player.py, Math.max(3, cell * 0.28), 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }
  
    // ── Game flow ────────────────────────────────────────
    function newMaze() {
      generate();
      player = { x: 0, y: 0, px: cx(0), py: cy(0) };
      goal = { x: cols - 1, y: rows - 1 };
      trail = [[0, 0]];
      moves = 0; hintsUsed = 0; assisted = false;
      startTime = null; endTime = null;
      hintPath = null; solvePath = null; solveIdx = 0;
      overlay.classList.remove('show');
      confettiBox.innerHTML = '';
      phase = 'generating';
      genProgress = 0;
      updateStats();
      resize();
      player.px = cx(0); player.py = cy(0);
    }
  
    function tryMove(dir) {
      if (phase !== 'playing') return;
      const { x, y } = player;
      if (walls[y][x][dir]) return;
      player.x = x + DX[dir];
      player.y = y + DY[dir];
      moves++;
      if (!startTime) startTime = performance.now();
  
      // trail: backtracking erases, new ground extends
      const last = trail[trail.length - 2];
      if (last && last[0] === player.x && last[1] === player.y) trail.pop();
      else trail.push([player.x, player.y]);
  
      updateStats();
      if (player.x === goal.x && player.y === goal.y) win(false);
    }
  
    function showHint() {
      if (phase !== 'playing') return;
      const path = bfs(player.x, player.y, goal.x, goal.y);
      if (!path) return;
      hintPath = path.slice(0, Math.min(path.length, Math.max(6, Math.floor(path.length * 0.18))));
      hintUntil = performance.now() + 3500;
      hintsUsed++;
      if (!startTime) startTime = performance.now();
      updateStats();
      hintToast.classList.add('show');
      setTimeout(() => hintToast.classList.remove('show'), 2600);
    }
  
    function autoSolve() {
      if (phase !== 'playing') return;
      solvePath = bfs(player.x, player.y, goal.x, goal.y);
      if (!solvePath) return;
      solveIdx = 0;
      solveTimer = 0;
      assisted = true;
      hintPath = null;
      if (!startTime) startTime = performance.now();
      phase = 'autosolving';
      btnHint.disabled = true;
      btnSolve.disabled = true;
    }
  
    function win(byAuto) {
      phase = 'won';
      endTime = performance.now();
      btnHint.disabled = true;
      btnSolve.disabled = true;
      updateStats();
  
      document.getElementById('winEmoji').textContent = byAuto ? '🤝' : (hintsUsed ? '🎉' : '🏆');
      document.getElementById('winTitle').textContent = byAuto ? 'Solved — teamwork!' : 'Maze conquered!';
      document.getElementById('winSub').textContent = byAuto
        ? 'No shame in calling for backup. Try the next one solo?'
        : hintsUsed
          ? 'You made it, with just a nudge or two.'
          : 'You found the exit all by yourself. Flawless!';
      document.getElementById('winTime').textContent = elTime.textContent;
      document.getElementById('winMoves').textContent = moves;
      document.getElementById('winHints').textContent = hintsUsed;
  
      if (!byAuto) burstConfetti();
      setTimeout(() => overlay.classList.add('show'), byAuto ? 500 : 350);
    }
  
    function burstConfetti() {
      const colors = ['#7c5cff', '#00d4ff', '#ffc857', '#3ddc97', '#ff6b81'];
      for (let i = 0; i < 80; i++) {
        const p = document.createElement('i');
        p.style.left = Math.random() * 100 + '%';
        p.style.background = colors[i % colors.length];
        p.style.animationDuration = (1.4 + Math.random() * 1.6) + 's';
        p.style.animationDelay = (Math.random() * 0.4) + 's';
        p.style.transform = 'rotate(' + Math.random() * 360 + 'deg)';
        confettiBox.appendChild(p);
      }
      setTimeout(() => (confettiBox.innerHTML = ''), 3600);
    }
  
    function updateStats() {
      elMoves.textContent = moves;
      elHints.textContent = hintsUsed;
    }
  
    function fmtTime(ms) {
      const s = Math.floor(ms / 1000);
      return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
    }
  
    // ── Main loop ────────────────────────────────────────
    let lastFrame = 0;
    function loop(now) {
      requestAnimationFrame(loop);
      const dt = Math.min(50, now - lastFrame);
      lastFrame = now;
  
      if (phase === 'generating') {
        const perFrame = Math.max(2, Math.ceil(genOrder.length / 80)); // ~1.3s reveal
        genProgress = Math.min(genOrder.length, genProgress + perFrame);
        if (genProgress >= genOrder.length) {
          phase = 'playing';
          btnHint.disabled = false;
          btnSolve.disabled = false;
        }
      }
  
      if (phase === 'autosolving' && solvePath) {
        solveTimer += dt;
        const stepMs = Math.max(24, 900 / Math.sqrt(solvePath.length) | 0);
        while (solveTimer >= stepMs && solveIdx < solvePath.length - 1) {
          solveTimer -= stepMs;
          solveIdx++;
          const [nx, ny] = solvePath[solveIdx];
          player.x = nx; player.y = ny;
        }
        if (solveIdx >= solvePath.length - 1 && phase !== 'won') win(true);
      }
  
      if ((phase === 'playing' || phase === 'autosolving') && startTime && !endTime) {
        elTime.textContent = fmtTime(now - startTime);
      }
  
      draw(now);
    }
  
    // ── Input ────────────────────────────────────────────
    const KEYS = {
      ArrowUp: 0, KeyW: 0,
      ArrowRight: 1, KeyD: 1,
      ArrowDown: 2, KeyS: 2,
      ArrowLeft: 3, KeyA: 3,
    };
    window.addEventListener('keydown', e => {
      if (e.code in KEYS) {
        e.preventDefault();
        tryMove(KEYS[e.code]);
      } else if (e.code === 'KeyH') showHint();
    });
  
    // swipe
    let touchStart = null;
    canvas.addEventListener('touchstart', e => {
      touchStart = [e.touches[0].clientX, e.touches[0].clientY];
    }, { passive: true });
    canvas.addEventListener('touchend', e => {
      if (!touchStart) return;
      const dx = e.changedTouches[0].clientX - touchStart[0];
      const dy = e.changedTouches[0].clientY - touchStart[1];
      touchStart = null;
      if (Math.max(Math.abs(dx), Math.abs(dy)) < 24) return;
      tryMove(Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? 1 : 3) : (dy > 0 ? 2 : 0));
    }, { passive: true });
  
    // d-pad (with press & hold repeat)
    document.querySelectorAll('#dpad button').forEach(b => {
      let rep = null;
      const dir = +b.dataset.dir;
      const start = e => {
        e.preventDefault();
        tryMove(dir);
        rep = setInterval(() => tryMove(dir), 140);
      };
      const stop = () => { clearInterval(rep); rep = null; };
      b.addEventListener('pointerdown', start);
      b.addEventListener('pointerup', stop);
      b.addEventListener('pointerleave', stop);
      b.addEventListener('pointercancel', stop);
    });
  
    // difficulty
    document.querySelectorAll('#difficulty button').forEach(b => {
      b.addEventListener('click', () => {
        document.querySelectorAll('#difficulty button').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        cols = +b.dataset.cols;
        rows = +b.dataset.rows;
        newMaze();
      });
    });
  
    btnNew.addEventListener('click', newMaze);
    btnAgain.addEventListener('click', newMaze);
    btnHint.addEventListener('click', showHint);
    btnSolve.addEventListener('click', autoSolve);
    window.addEventListener('resize', () => { resize(); player.px = cx(player.x); player.py = cy(player.y); });
  
    // ── Go! ──────────────────────────────────────────────
    newMaze();
    requestAnimationFrame(loop);
  })();
  </script>
  </body>
  </html>
