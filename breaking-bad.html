<!doctype html>
  <html lang="en">
  <head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Breaking Trivia — Say My Name</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/oswald@5.0.13/index.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.0.18/index.css" />
  <style>
    :root{
      --bg:#0b100e;
      --surface:#121a16;
      --surface2:#182420;
      --line:#24352d;
      --green:#3fd97f;
      --green-dim:#2a9d5c;
      --gold:#e8b53a;
      --gold-dim:#b98c22;
      --red:#e05252;
      --text:#e8f0ea;
      --muted:#8aa295;
      --radius:16px;
      --display:'Oswald', 'Arial Narrow', sans-serif;
      --body:'Inter', system-ui, -apple-system, sans-serif;
    }
    *{box-sizing:border-box; margin:0; padding:0;}
    html,body{height:100%;}
    body{
      background:
        radial-gradient(1200px 600px at 50% -10%, rgba(63,217,127,.09), transparent 60%),
        radial-gradient(900px 500px at 85% 110%, rgba(232,181,58,.07), transparent 60%),
        var(--bg);
      color:var(--text);
      font-family:var(--body);
      min-height:100%;
      display:flex; align-items:flex-start; justify-content:center;
      padding:32px 16px 48px;
      -webkit-font-smoothing:antialiased;
    }
    .shell{width:100%; max-width:680px;}
  
    /* ---------- shared ---------- */
    .screen{display:none; animation:fadeUp .45s ease both;}
    .screen.active{display:block;}
    @keyframes fadeUp{from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:none;}}
  
    .btn{
      font-family:var(--display); letter-spacing:.08em; text-transform:uppercase;
      border:1px solid var(--line); background:var(--surface2); color:var(--text);
      padding:13px 26px; border-radius:12px; font-size:15px; cursor:pointer;
      transition:transform .15s ease, border-color .2s, box-shadow .2s, background .2s;
    }
    .btn:hover{transform:translateY(-2px); border-color:var(--green-dim); box-shadow:0 8px 24px rgba(63,217,127,.12);}
    .btn.primary{background:linear-gradient(135deg,#1d5b38,#2a9d5c); border-color:#2f8a53;}
    .btn.primary:hover{box-shadow:0 10px 28px rgba(63,217,127,.25);}
    .btn.gold{background:linear-gradient(135deg,#6e5312,#b98c22); border-color:#a37f22;}
    .btn.gold:hover{box-shadow:0 10px 28px rgba(232,181,58,.22);}
    .btn.ghost{background:transparent;}
  
    .topbar{display:flex; align-items:center; justify-content:space-between; margin-bottom:20px;}
    .backlink{
      color:var(--muted); background:none; border:none; cursor:pointer; font-family:var(--body);
      font-size:13px; display:inline-flex; align-items:center; gap:6px; padding:6px 0;
    }
    .backlink:hover{color:var(--text);}
  
    /* ---------- menu ---------- */
    .logo{display:flex; justify-content:center; gap:10px; margin:18px 0 6px;}
    .tile{
      width:86px; height:86px; border-radius:14px; position:relative;
      display:flex; align-items:center; justify-content:center;
      font-family:var(--display); font-weight:600; font-size:40px;
      border:1px solid rgba(255,255,255,.14);
      box-shadow:0 16px 40px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.18);
    }
    .tile small{position:absolute; top:7px; left:9px; font-size:11px; font-weight:400; opacity:.85;}
    .tile.green{background:linear-gradient(160deg,#2f8a53,#173f2a); color:#eafff2; text-shadow:0 2px 12px rgba(0,0,0,.4);}
    .tile.gold{background:linear-gradient(160deg,#c99a2c,#6e5312); color:#fff7e2; text-shadow:0 2px 12px rgba(0,0,0,.4);}
    h1.title{
      font-family:var(--display); text-align:center; font-size:44px; letter-spacing:.14em;
      text-transform:uppercase; font-weight:600; margin-top:20px;
    }
    h1.title .accent{color:var(--green);}
    .tagline{text-align:center; color:var(--muted); font-size:14px; margin-top:8px; letter-spacing:.04em;}
    .tagline em{color:var(--gold); font-style:normal;}
  
    .modes{display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:36px;}
    @media (max-width:560px){.modes{grid-template-columns:1fr;}}
    .mode-card{
      background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
      padding:26px 22px; cursor:pointer; text-align:left;
      transition:transform .18s ease, border-color .25s, box-shadow .25s;
    }
    .mode-card:hover{transform:translateY(-4px);}
    .mode-card.green-hover:hover{border-color:var(--green-dim); box-shadow:0 14px 40px rgba(63,217,127,.14);}
    .mode-card.gold-hover:hover{border-color:var(--gold-dim); box-shadow:0 14px 40px rgba(232,181,58,.14);}
    .mode-card .icon{font-size:28px;}
    .mode-card h2{font-family:var(--display); font-size:21px; letter-spacing:.06em; text-transform:uppercase; margin:12px 0 6px; font-weight:500;}
    .mode-card p{color:var(--muted); font-size:13.5px; line-height:1.55;}
    .mode-card .go{margin-top:16px; font-size:12px; letter-spacing:.12em; text-transform:uppercase; font-family:var(--display);}
    .mode-card.green-hover .go{color:var(--green);}
    .mode-card.gold-hover .go{color:var(--gold);}
    .footer-quote{text-align:center; color:var(--muted); font-size:12px; margin-top:38px; letter-spacing:.03em;}
  
    /* ---------- trivia ---------- */
    .hud{display:flex; gap:12px; margin-bottom:18px;}
    .hud .stat{
      flex:1; background:var(--surface); border:1px solid var(--line); border-radius:12px;
      padding:10px 14px; text-align:center;
    }
    .hud .stat .label{font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted);}
    .hud .stat .value{font-family:var(--display); font-size:22px; margin-top:2px; font-weight:500;}
    .hud .stat .value.money{color:var(--gold);}
    .hud .stat .value.streak{color:var(--green);}
  
    .timerwrap{height:6px; background:var(--surface2); border-radius:99px; overflow:hidden; margin-bottom:22px;}
    .timerbar{height:100%; width:100%; border-radius:99px; background:linear-gradient(90deg,var(--green),#8be9b4); transition:width .1s linear;}
    .timerbar.danger{background:linear-gradient(90deg,#e05252,#f0884f);}
  
    .qcard{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:28px;}
    .qmeta{display:flex; justify-content:space-between; font-size:11.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin-bottom:14px;}
    .qmeta .show-tag{color:var(--green);}
    .qmeta .show-tag.bcs{color:var(--gold);}
    .qtext{font-size:21px; line-height:1.45; font-weight:600; margin-bottom:24px;}
    .answers{display:grid; gap:10px;}
    .answer{
      text-align:left; background:var(--surface2); border:1px solid var(--line); color:var(--text);
      border-radius:12px; padding:14px 16px; font-size:15px; font-family:var(--body); cursor:pointer;
      display:flex; align-items:center; gap:12px; transition:border-color .15s, background .15s, transform .12s;
    }
    .answer:hover:not(:disabled){border-color:var(--green-dim); transform:translateX(4px);}
    .answer .key{
      font-family:var(--display); font-size:12px; color:var(--muted);
      border:1px solid var(--line); border-radius:7px; width:24px; height:24px; flex:none;
      display:inline-flex; align-items:center; justify-content:center;
    }
    .answer.correct{background:rgba(63,217,127,.14); border-color:var(--green); }
    .answer.correct .key{border-color:var(--green); color:var(--green);}
    .answer.wrong{background:rgba(224,82,82,.13); border-color:var(--red);}
    .answer.wrong .key{border-color:var(--red); color:var(--red);}
    .answer:disabled{cursor:default; opacity:.9;}
    .answer.dim{opacity:.38;}
    .fact{
      margin-top:18px; padding:13px 16px; border-left:3px solid var(--gold);
      background:rgba(232,181,58,.06); border-radius:0 10px 10px 0;
      color:#d9cba4; font-size:13.5px; line-height:1.55; display:none;
    }
    .fact.show{display:block; animation:fadeUp .3s ease both;}
    .nextrow{display:flex; justify-content:flex-end; margin-top:20px; min-height:48px;}
  
    /* ---------- results ---------- */
    .result-card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:40px 32px; text-align:center;}
    .result-rank-tile{margin:0 auto 18px; width:96px; height:96px; font-size:44px;}
    .result-card h2{font-family:var(--display); font-size:32px; letter-spacing:.1em; text-transform:uppercase; font-weight:600;}
    .result-card .rank{color:var(--green); margin-top:6px; font-family:var(--display); font-size:20px; letter-spacing:.08em; text-transform:uppercase;}
    .result-card .quote{color:var(--muted); font-size:14px; margin-top:14px; line-height:1.6; font-style:italic;}
    .result-stats{display:flex; justify-content:center; gap:36px; margin:28px 0;}
    .result-stats div{text-align:center;}
    .result-stats .num{font-family:var(--display); font-size:30px; font-weight:600;}
    .result-stats .num.gold{color:var(--gold);}
    .result-stats .lbl{font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin-top:3px;}
    .result-actions{display:flex; gap:12px; justify-content:center; flex-wrap:wrap;}
  
    /* ---------- memory ---------- */
    .memgrid{display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-top:6px;}
    .memcard{perspective:800px; cursor:pointer; aspect-ratio:1;}
    .memcard .inner{
      position:relative; width:100%; height:100%;
      transform-style:preserve-3d; transition:transform .45s cubic-bezier(.2,.7,.3,1.1);
    }
    .memcard.flipped .inner{transform:rotateY(180deg);}
    .memface{
      position:absolute; inset:0; backface-visibility:hidden; border-radius:13px;
      display:flex; align-items:center; justify-content:center; flex-direction:column;
      border:1px solid var(--line);
    }
    .memface.back{
      background:linear-gradient(150deg,var(--surface2),var(--surface));
      font-family:var(--display); color:var(--muted); font-size:20px;
    }
    .memface.back::after{content:'⚗'; font-size:26px; opacity:.4;}
    .memcard:hover:not(.flipped):not(.matched) .memface.back{border-color:var(--green-dim);}
    .memface.front{transform:rotateY(180deg); font-family:var(--display); border:1px solid rgba(255,255,255,.15);}
    .memface.front .sym{font-size:clamp(22px,6vw,34px); font-weight:600;}
    .memface.front .nm{font-size:clamp(8px,1.8vw,10.5px); letter-spacing:.06em; text-transform:uppercase; opacity:.9; margin-top:3px;}
    .memface.front.g{background:linear-gradient(160deg,#2f8a53,#173f2a); color:#eafff2;}
    .memface.front.y{background:linear-gradient(160deg,#c99a2c,#6e5312); color:#fff7e2;}
    .memcard.matched{cursor:default;}
    .memcard.matched .inner{animation:pop .4s ease;}
    .memcard.matched .memface.front{box-shadow:0 0 0 2px var(--green), 0 0 24px rgba(63,217,127,.35);}
    @keyframes pop{0%{transform:rotateY(180deg) scale(1);}50%{transform:rotateY(180deg) scale(1.08);}100%{transform:rotateY(180deg) scale(1);}}
    .memwin{
      display:none; margin-top:22px; text-align:center; background:var(--surface);
      border:1px solid var(--green-dim); border-radius:var(--radius); padding:26px;
      animation:fadeUp .4s ease both;
    }
    .memwin.show{display:block;}
    .memwin h3{font-family:var(--display); font-size:24px; letter-spacing:.1em; text-transform:uppercase; color:var(--green); font-weight:600;}
    .memwin p{color:var(--muted); font-size:13.5px; margin:10px 0 18px; line-height:1.6;}
  </style>
  </head>
  <body>
  <div class="shell">
  
    <!-- ============ MENU ============ -->
    <section id="screen-menu" class="screen active">
      <div class="logo">
        <div class="tile green"><small>35</small>Br</div>
        <div class="tile gold"><small>56</small>Ba</div>
      </div>
      <h1 class="title">Breaking <span class="accent">Trivia</span></h1>
      <p class="tagline">A Breaking Bad × Better Call Saul game &nbsp;·&nbsp; <em>S'all good, man.</em></p>
  
      <div class="modes">
        <button class="mode-card green-hover" onclick="Trivia.start()">
          <div class="icon">🧪</div>
          <h2>Say My Name</h2>
          <p>10 questions from Albuquerque's finest saga. Beat the clock, build a streak, stack that cash.</p>
          <div class="go">Start cooking →</div>
        </button>
        <button class="mode-card gold-hover" onclick="Memory.start()">
          <div class="icon">🃏</div>
          <h2>Cook the Pairs</h2>
          <p>Flip the periodic tiles and match every character pair. Fewer moves, better rank. No half measures.</p>
          <div class="go">Deal me in →</div>
        </button>
      </div>
  
      <p class="footer-quote" id="menu-quote"></p>
    </section>
  
    <!-- ============ TRIVIA ============ -->
    <section id="screen-trivia" class="screen">
      <div class="topbar">
        <button class="backlink" onclick="App.show('menu')">← Abandon the cook</button>
        <span style="color:var(--muted); font-size:13px;" id="t-progress"></span>
      </div>
      <div class="hud">
        <div class="stat"><div class="label">Earnings</div><div class="value money" id="t-money">$0</div></div>
        <div class="stat"><div class="label">Streak</div><div class="value streak" id="t-streak">×0</div></div>
        <div class="stat"><div class="label">Correct</div><div class="value" id="t-correct">0</div></div>
      </div>
      <div class="timerwrap"><div class="timerbar" id="t-timer"></div></div>
      <div class="qcard">
        <div class="qmeta"><span class="show-tag" id="t-show"></span><span id="t-difficulty"></span></div>
        <div class="qtext" id="t-question"></div>
        <div class="answers" id="t-answers"></div>
        <div class="fact" id="t-fact"></div>
        <div class="nextrow"><button class="btn primary" id="t-next" style="display:none;" onclick="Trivia.next()">Next →</button></div>
      </div>
    </section>
  
    <!-- ============ RESULTS ============ -->
    <section id="screen-results" class="screen">
      <div class="result-card">
        <div class="tile result-rank-tile" id="r-tile"><small id="r-tile-num"></small><span id="r-tile-sym"></span></div>
        <h2>Verdict Is In</h2>
        <div class="rank" id="r-rank"></div>
        <p class="quote" id="r-quote"></p>
        <div class="result-stats">
          <div><div class="num" id="r-score"></div><div class="lbl">Correct</div></div>
          <div><div class="num gold" id="r-money"></div><div class="lbl">Earned</div></div>
          <div><div class="num" id="r-beststreak"></div><div class="lbl">Best Streak</div></div>
        </div>
        <div class="result-actions">
          <button class="btn primary" onclick="Trivia.start()">Cook Again</button>
          <button class="btn ghost" onclick="App.show('menu')">Main Menu</button>
        </div>
      </div>
    </section>
  
    <!-- ============ MEMORY ============ -->
    <section id="screen-memory" class="screen">
      <div class="topbar">
        <button class="backlink" onclick="Memory.quit()">← Back to the office</button>
        <span style="color:var(--muted); font-size:13px;">
          Moves: <b id="m-moves" style="color:var(--text)">0</b> &nbsp;·&nbsp;
          Time: <b id="m-time" style="color:var(--text)">0s</b>
        </span>
      </div>
      <div class="memgrid" id="m-grid"></div>
      <div class="memwin" id="m-win">
        <h3 id="m-win-title"></h3>
        <p id="m-win-text"></p>
        <button class="btn gold" onclick="Memory.start()">Shuffle &amp; Replay</button>
        <button class="btn ghost" onclick="App.show('menu')">Main Menu</button>
      </div>
    </section>
  
  </div>
  
  <script>
  'use strict';
  
  /* ================= App shell ================= */
  const App = {
    show(name){
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      const el = document.getElementById('screen-' + name);
      el.classList.remove('active'); void el.offsetWidth; // retrigger animation
      el.classList.add('active');
      if (name !== 'trivia') Trivia.stopTimer();
      if (name !== 'memory') Memory.stopClock();
    }
  };
  
  const MENU_QUOTES = [
    '“I am not in danger, Skyler. I am the danger.”',
    '“It\u2019s showtime, folks.”',
    '“Perfection is the enemy of perfectly adequate.”',
    '“No more half measures.”',
    '“Yeah, science!”',
    '“If you\u2019re committed enough, you can make any story work.”'
  ];
  document.getElementById('menu-quote').textContent =
    MENU_QUOTES[Math.floor(Math.random() * MENU_QUOTES.length)];
  
  function shuffle(arr){
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }
  
  /* ================= Trivia ================= */
  const QUESTIONS = [
    {show:'BrBa', d:'Easy',   q:'What alias does Walter White adopt in the meth trade?', a:'Heisenberg', w:['Ozymandias','Mr. Lambert','The Chemist'], f:'Named after Werner Heisenberg, the physicist behind the uncertainty principle.'},
    {show:'BrBa', d:'Easy',   q:'Which fast-food chain does Gus Fring use as his front?', a:'Los Pollos Hermanos', w:['El Camino Grill','Twisters','Pollo Loco'], f:'“The Chicken Brothers” — finger-lickin\u2019 money laundering.'},
    {show:'BCS',  d:'Easy',   q:'What is Saul Goodman\u2019s real name?', a:'Jimmy McGill', w:['Gene Takavic','Marco Pasternak','Howard Hamlin'], f:'“Saul Goodman” = “S\u2019all good, man.”'},
    {show:'BrBa', d:'Easy',   q:'What subject does Walter White teach at the start of the series?', a:'Chemistry', w:['Physics','Biology','Mathematics'], f:'Chemistry is, after all, the study of change.'},
    {show:'BrBa', d:'Easy',   q:'What color is Walt and Jesse\u2019s signature product?', a:'Blue', w:['Green','Clear','Purple'], f:'Blue Sky — 99.1% pure, according to the cook himself.'},
    {show:'BrBa', d:'Easy',   q:'Which agency does Hank Schrader work for?', a:'The DEA', w:['The FBI','The ATF','Albuquerque PD'], f:'Hank rose to ASAC of the Albuquerque field office.'},
    {show:'BCS',  d:'Easy',   q:'Who is Jimmy McGill\u2019s brilliant but troubled older brother?', a:'Chuck', w:['Howard','Marco','Nacho'], f:'A founding partner of HHM, undone by more than electricity.'},
    {show:'BCS',  d:'Medium', q:'What condition does Chuck McGill believe he suffers from?', a:'Electromagnetic hypersensitivity', w:['Chronic insomnia','Agoraphobia','Photophobia'], f:'Space blankets, gas lanterns, and no phones allowed.'},
    {show:'BrBa', d:'Medium', q:'What car wash do Walt and Skyler buy to launder money?', a:'A1A Car Wash', w:['Octopus Car Wash','Mighty Suds','Duke City Shine'], f:'“Have an A1 day!”'},
    {show:'BrBa', d:'Medium', q:'How does Hector Salamanca communicate after his stroke?', a:'Ringing a bell', w:['Blinking in Morse code','A letter board','A voice machine'], f:'Ding. Ding. Ding.'},
    {show:'BCS',  d:'Medium', q:'What is Kim Wexler\u2019s favorite con-artist alias (shared with Jimmy)?', a:'Giselle Saint Claire', w:['Viktoria Prime','Kimberly Wells','Carol Burnett'], f:'Viktor with a K and Giselle — masters of the Tequila con.'},
    {show:'BrBa', d:'Medium', q:'Who says: “I am the one who knocks”?', a:'Walter White', w:['Gus Fring','Mike Ehrmantraut','Tuco Salamanca'], f:'One of TV\u2019s most quoted kitchen arguments, from “Cornered.”'},
    {show:'BCS',  d:'Medium', q:'In Better Call Saul, what is Mike\u2019s first job in Albuquerque?', a:'Parking booth attendant', w:['Private investigator','Bodyguard','Security consultant'], f:'The courthouse booth — where stickers matter more than badges.'},
    {show:'BCS',  d:'Medium', q:'What law firm did Chuck McGill co-found?', a:'HHM (Hamlin, Hamlin & McGill)', w:['Davis & Main','Wexler McGill','Schweikart & Cokely'], f:'The letterhead Jimmy could never quite get onto.'},
    {show:'BrBa', d:'Hard',   q:'What nickname does Jesse give the RV?', a:'The Crystal Ship', w:['The Cook Shack','Old Bessie','The Blue Bomber'], f:'A nod to the 1967 song by The Doors.'},
    {show:'BrBa', d:'Hard',   q:'Who is the cartel boss Gus finally poisons at the pool party?', a:'Don Eladio', w:['Juan Bolsa','Hector Salamanca','Lalo Salamanca'], f:'Zafiro Añejo — a toast decades in the making.'},
    {show:'BCS',  d:'Hard',   q:'What alias does Jimmy live under in Omaha after the events of Breaking Bad?', a:'Gene Takavic', w:['Frank Mehta','Victor St. Claire','Dave Clark'], f:'Manager of a Cinnabon — just like he always joked.'},
    {show:'BrBa', d:'Hard',   q:'What is the name of Mike\u2019s beloved granddaughter?', a:'Kaylee', w:['Holly','Marie','Stacey'], f:'Everything Mike did, he did for her.'},
    {show:'BCS',  d:'Hard',   q:'Which Salamanca comes to Albuquerque to find out what happened to the drug operation?', a:'Lalo', w:['Tuco','Marco','Leonel'], f:'First mentioned in Breaking Bad years before he ever appeared on screen.'},
    {show:'BrBa', d:'Hard',   q:'What do the Cousins leave at Hank\u2019s shooting scene... almost?', a:'An axe', w:['A skull charm','A bullet with his name','A Santa Muerte card'], f:'The shiny axe — one of the coldest images in the series.'}
  ];
  
  const RANKS = [
    {min:10, sym:'He', num:'2',  cls:'green', rank:'Heisenberg', quote:'“You\u2019re goddamn right.” A perfect cook. Tread lightly, everyone else.'},
    {min:8,  sym:'Gu', num:'24', cls:'gold',  rank:'Los Pollos Executive', quote:'Meticulous. Professional. Gus would be proud — and slightly threatened.'},
    {min:6,  sym:'Mi', num:'26', cls:'green', rank:'The Fixer', quote:'Solid work. No loose ends. Mike nods once and drives away.'},
    {min:4,  sym:'Sa', num:'79', cls:'gold',  rank:'Slippin\u2019 Jimmy', quote:'You talked your way through half of it. Better call... a rewatch.'},
    {min:0,  sym:'Sk', num:'3',  cls:'green', rank:'Skinny Pete', quote:'Hey, at least Skinny Pete can play piano. Time for a full series rewatch, yo.'}
  ];
  
  const Trivia = {
    deck:[], idx:0, money:0, streak:0, best:0, correct:0,
    timerId:null, timeLeft:0, TIME:15,
  
    start(){
      this.deck = shuffle(QUESTIONS).slice(0, 10);
      this.idx = 0; this.money = 0; this.streak = 0; this.best = 0; this.correct = 0;
      App.show('trivia');
      this.render();
    },
  
    render(){
      const q = this.deck[this.idx];
      document.getElementById('t-progress').textContent = 'Question ' + (this.idx + 1) + ' / ' + this.deck.length;
      const showEl = document.getElementById('t-show');
      showEl.textContent = q.show === 'BrBa' ? '⚗ Breaking Bad' : '⚖ Better Call Saul';
      showEl.classList.toggle('bcs', q.show === 'BCS');
      document.getElementById('t-difficulty').textContent = q.d;
      document.getElementById('t-question').textContent = q.q;
      const fact = document.getElementById('t-fact');
      fact.classList.remove('show');
      document.getElementById('t-next').style.display = 'none';
  
      const options = shuffle([q.a, ...q.w]);
      const box = document.getElementById('t-answers');
      box.innerHTML = '';
      const keys = ['A','B','C','D'];
      options.forEach((opt, i) => {
        const b = document.createElement('button');
        b.className = 'answer';
        b.innerHTML = '<span class="key">' + keys[i] + '</span><span></span>';
        b.lastElementChild.textContent = opt;
        b.onclick = () => this.answer(b, opt === q.a);
        box.appendChild(b);
      });
      this.updateHud();
      this.startTimer();
    },
  
    startTimer(){
      this.stopTimer();
      this.timeLeft = this.TIME * 10;
      const bar = document.getElementById('t-timer');
      bar.classList.remove('danger');
      bar.style.width = '100%';
      this.timerId = setInterval(() => {
        this.timeLeft--;
        const pct = this.timeLeft / (this.TIME * 10) * 100;
        bar.style.width = pct + '%';
        if (pct < 30) bar.classList.add('danger');
        if (this.timeLeft <= 0) this.answer(null, false, true);
      }, 100);
    },
  
    stopTimer(){ if (this.timerId){ clearInterval(this.timerId); this.timerId = null; } },
  
    answer(btn, isCorrect, timedOut){
      this.stopTimer();
      const q = this.deck[this.idx];
      document.querySelectorAll('#t-answers .answer').forEach(b => {
        b.disabled = true;
        const text = b.lastElementChild.textContent;
        if (text === q.a) b.classList.add('correct');
        else if (b === btn) b.classList.add('wrong');
        else b.classList.add('dim');
      });
      if (isCorrect){
        this.correct++;
        this.streak++;
        this.best = Math.max(this.best, this.streak);
        const bonus = Math.round(this.timeLeft / (this.TIME * 10) * 5000);
        this.money += 10000 + bonus + (this.streak - 1) * 2500;
      } else {
        this.streak = 0;
      }
      const fact = document.getElementById('t-fact');
      fact.textContent = (timedOut ? '⏱ Time\u2019s up! The answer was “' + q.a + '.” ' : '') + '💡 ' + q.f;
      fact.classList.add('show');
      const next = document.getElementById('t-next');
      next.textContent = this.idx + 1 < this.deck.length ? 'Next →' : 'See Verdict →';
      next.style.display = 'inline-block';
      this.updateHud();
    },
  
    next(){
      this.idx++;
      if (this.idx < this.deck.length) this.render();
      else this.finish();
    },
  
    updateHud(){
      document.getElementById('t-money').textContent = '$' + this.money.toLocaleString('en-US');
      document.getElementById('t-streak').textContent = '×' + this.streak;
      document.getElementById('t-correct').textContent = this.correct;
    },
  
    finish(){
      const r = RANKS.find(r => this.correct >= r.min);
      const tile = document.getElementById('r-tile');
      tile.className = 'tile result-rank-tile ' + r.cls;
      document.getElementById('r-tile-sym').textContent = r.sym;
      document.getElementById('r-tile-num').textContent = r.num;
      document.getElementById('r-rank').textContent = r.rank;
      document.getElementById('r-quote').textContent = r.quote;
      document.getElementById('r-score').textContent = this.correct + '/' + this.deck.length;
      document.getElementById('r-money').textContent = '$' + this.money.toLocaleString('en-US');
      document.getElementById('r-beststreak').textContent = '×' + this.best;
      App.show('results');
    }
  };
  
  /* ================= Memory ================= */
  const CHARACTERS = [
    {sym:'He', nm:'Heisenberg', c:'g'},
    {sym:'Sa', nm:'Saul',       c:'y'},
    {sym:'Gu', nm:'Gus',        c:'g'},
    {sym:'Je', nm:'Jesse',      c:'g'},
    {sym:'Mi', nm:'Mike',       c:'y'},
    {sym:'Ki', nm:'Kim',        c:'y'},
    {sym:'La', nm:'Lalo',       c:'y'},
    {sym:'Hk', nm:'Hank',       c:'g'}
  ];
  
  const Memory = {
    first:null, lock:false, moves:0, matched:0, seconds:0, clockId:null,
  
    start(){
      this.first = null; this.lock = false; this.moves = 0; this.matched = 0; this.seconds = 0;
      document.getElementById('m-moves').textContent = '0';
      document.getElementById('m-time').textContent = '0s';
      document.getElementById('m-win').classList.remove('show');
  
      const grid = document.getElementById('m-grid');
      grid.innerHTML = '';
      shuffle([...CHARACTERS, ...CHARACTERS]).forEach(ch => {
        const card = document.createElement('div');
        card.className = 'memcard';
        card.dataset.sym = ch.sym;
        card.innerHTML =
          '<div class="inner">' +
            '<div class="memface back"></div>' +
            '<div class="memface front ' + ch.c + '"><span class="sym">' + ch.sym + '</span><span class="nm">' + ch.nm + '</span></div>' +
          '</div>';
        card.onclick = () => this.flip(card);
        grid.appendChild(card);
      });
  
      App.show('memory');
      this.stopClock();
      this.clockId = setInterval(() => {
        this.seconds++;
        document.getElementById('m-time').textContent = this.seconds + 's';
      }, 1000);
    },
  
    stopClock(){ if (this.clockId){ clearInterval(this.clockId); this.clockId = null; } },
    quit(){ this.stopClock(); App.show('menu'); },
  
    flip(card){
      if (this.lock || card.classList.contains('flipped') || card.classList.contains('matched')) return;
      card.classList.add('flipped');
      if (!this.first){ this.first = card; return; }
  
      this.moves++;
      document.getElementById('m-moves').textContent = this.moves;
      const a = this.first, b = card;
      this.first = null;
  
      if (a.dataset.sym === b.dataset.sym){
        a.classList.add('matched'); b.classList.add('matched');
        this.matched++;
        if (this.matched === CHARACTERS.length) this.win();
      } else {
        this.lock = true;
        setTimeout(() => {
          a.classList.remove('flipped');
          b.classList.remove('flipped');
          this.lock = false;
        }, 750);
      }
    },
  
    win(){
      this.stopClock();
      let title, text;
      if (this.moves <= 12){
        title = '⚗ 99.1% Pure!';
        text = 'Flawless memory. ' + this.moves + ' moves in ' + this.seconds + 's — Gale would write a lab report about you.';
      } else if (this.moves <= 18){
        title = '⚖ It\u2019s All Good, Man';
        text = this.moves + ' moves in ' + this.seconds + 's. A solid con — Kim would almost be impressed.';
      } else {
        title = '🚐 The RV Broke Down';
        text = this.moves + ' moves in ' + this.seconds + 's. You got there... eventually. Badger-level performance.';
      }
      document.getElementById('m-win-title').textContent = title;
      document.getElementById('m-win-text').textContent = text;
      document.getElementById('m-win').classList.add('show');
    }
  };
  </script>
