  <!doctype html>
  <html lang="en">
  <head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Whiteboard</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: rgba(24, 26, 31, 0.92);
      --panel-border: rgba(255, 255, 255, 0.08);
      --text: #e8eaee;
      --muted: #9aa0ab;
      --accent: #4f8cff;
      --accent-soft: rgba(79, 140, 255, 0.18);
      --danger: #ff5d5d;
      --radius: 14px;
      --shadow: 0 10px 40px rgba(0, 0, 0, 0.35), 0 2px 8px rgba(0, 0, 0, 0.25);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: "Inter", -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      -webkit-user-select: none; user-select: none;
    }
    #board { position: fixed; inset: 0; touch-action: none; cursor: crosshair; }
  
    /* ---------- Floating panels ---------- */
    .panel {
      position: fixed;
      background: var(--panel);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      z-index: 10;
      color: var(--text);
    }
  
    /* Toolbar (bottom center) */
    #toolbar {
      left: 50%; bottom: 18px; transform: translateX(-50%);
      padding: 8px; gap: 4px; flex-wrap: wrap; justify-content: center;
      max-width: calc(100vw - 24px);
    }
    .divider { width: 1px; height: 26px; background: var(--panel-border); margin: 0 6px; flex: none; }
  
    button.tool {
      all: unset;
      width: 40px; height: 40px;
      display: grid; place-items: center;
      border-radius: 10px;
      cursor: pointer;
      color: var(--muted);
      transition: background 0.15s, color 0.15s, transform 0.1s;
      position: relative;
    }
    button.tool:hover { background: rgba(255,255,255,0.07); color: var(--text); }
    button.tool:active { transform: scale(0.92); }
    button.tool.active { background: var(--accent-soft); color: var(--accent); }
    button.tool.danger:hover { color: var(--danger); background: rgba(255,93,93,0.12); }
    button.tool:disabled { opacity: 0.3; cursor: default; }
    button.tool:disabled:hover { background: none; color: var(--muted); }
    button.tool svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  
    /* Tooltip */
    button.tool[data-tip]::after {
      content: attr(data-tip);
      position: absolute; bottom: calc(100% + 10px); left: 50%; transform: translateX(-50%) translateY(3px);
      background: #0d0e11; color: var(--text);
      font-size: 11px; padding: 5px 9px; border-radius: 7px; white-space: nowrap;
      opacity: 0; pointer-events: none; transition: opacity 0.15s, transform 0.15s;
      border: 1px solid var(--panel-border);
    }
    button.tool[data-tip]:hover::after { opacity: 1; transform: translateX(-50%) translateY(0); }
    button.tool[data-tip] kbd { color: var(--muted); margin-left: 4px; font-family: inherit; }
  
    /* Color & size panel (left) */
    #sidepanel {
      left: 18px; top: 50%; transform: translateY(-50%);
      flex-direction: column; padding: 12px 10px; gap: 10px;
    }
    .swatch {
      all: unset;
      width: 26px; height: 26px; border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      outline: 2px solid transparent; outline-offset: 2px;
      transition: transform 0.12s, outline-color 0.15s;
    }
    .swatch:hover { transform: scale(1.15); }
    .swatch.active { outline-color: var(--accent); }
    .swatch.white-swatch { border-color: rgba(255,255,255,0.25); }
    #customColor {
      width: 26px; height: 26px; border-radius: 50%;
      overflow: hidden; cursor: pointer; position: relative;
      background: conic-gradient(red, yellow, lime, cyan, blue, magenta, red);
      outline: 2px solid transparent; outline-offset: 2px; transition: outline-color 0.15s;
    }
    #customColor.active { outline-color: var(--accent); }
    #customColor input { position: absolute; inset: -8px; opacity: 0; cursor: pointer; }
  
    #sizeWrap { display: flex; flex-direction: column; align-items: center; gap: 8px; padding-top: 4px; }
    #sizeSlider {
      -webkit-appearance: none; appearance: none;
      width: 90px; height: 4px; border-radius: 2px;
      background: rgba(255,255,255,0.15);
      transform: rotate(-90deg); margin: 42px 0;
      cursor: pointer;
    }
    #sizeSlider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
      background: var(--text); cursor: pointer; transition: transform 0.1s;
    }
    #sizeSlider::-webkit-slider-thumb:hover { transform: scale(1.2); }
    #sizeDot { border-radius: 50%; background: var(--text); transition: width 0.1s, height 0.1s, background 0.15s; }
  
    /* Top-right actions */
    #actions { right: 18px; top: 18px; padding: 6px; gap: 2px; }
  
    /* Zoom indicator (bottom-left) */
    #hint {
      position: fixed; left: 18px; bottom: 18px; z-index: 10;
      font-size: 11.5px; color: rgba(0,0,0,0.35);
      background: rgba(255,255,255,0.5); backdrop-filter: blur(8px);
      padding: 6px 10px; border-radius: 8px;
      pointer-events: none; transition: opacity 0.4s;
    }
    body.dark-board #hint { color: rgba(255,255,255,0.4); background: rgba(0,0,0,0.3); }
  
    /* Text input overlay */
    #textInput {
      position: fixed; z-index: 20; display: none;
      background: transparent; border: 1.5px dashed var(--accent); border-radius: 4px;
      outline: none; padding: 2px 6px; min-width: 40px;
      font-family: inherit;
    }
  
    /* Toast */
    #toast {
      position: fixed; top: 18px; left: 50%; transform: translateX(-50%) translateY(-8px);
      background: var(--panel); color: var(--text); border: 1px solid var(--panel-border);
      padding: 9px 16px; border-radius: 10px; font-size: 13px;
      opacity: 0; pointer-events: none; transition: opacity 0.25s, transform 0.25s;
      z-index: 30; box-shadow: var(--shadow);
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  
    @media (max-width: 640px) {
      #sidepanel { flex-direction: row; left: 50%; top: auto; bottom: 78px; transform: translateX(-50%); padding: 8px 12px; }
      #sizeSlider { transform: none; margin: 0; width: 70px; }
      #sizeWrap { flex-direction: row; padding: 0; }
      #hint { display: none; }
    }
  </style>
  </head>
  <body>
  <canvas id="board"></canvas>
  <input id="textInput" autocomplete="off" spellcheck="false" />
  <div id="toast"></div>
  <div id="hint">Scroll to pan · Ctrl+scroll to zoom · Space+drag to pan</div>
  
  <!-- Left: colors & size -->
  <div class="panel" id="sidepanel">
    <div id="swatches" style="display:flex; flex-direction:inherit; gap:10px; align-items:center;"></div>
    <div class="divider" style="width:26px; height:1px; margin:2px 0;"></div>
    <div id="sizeWrap">
      <input id="sizeSlider" type="range" min="1" max="40" value="4" />
      <div id="sizeDot" style="width:8px;height:8px;"></div>
    </div>
  </div>
  
  <!-- Bottom: tools -->
  <div class="panel" id="toolbar"></div>
  
  <!-- Top right: actions -->
  <div class="panel" id="actions"></div>
  
  <script>
  (() => {
    'use strict';
  
    // ---------- Icons (inline SVG paths, 24x24) ----------
    const ICONS = {
      pen: '<path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/>',
      highlighter: '<path d="M9 11l-6 6v3h9l3-3"/><path d="M22 12l-4.6 4.6a2 2 0 0 1-2.8 0l-5.2-5.2a2 2 0 0 1 0-2.8L14 4"/>',
      eraser: '<path d="M20 20H7L3 16a1.4 1.4 0 0 1 0-2l9-9a1.4 1.4 0 0 1 2 0l7 7a1.4 1.4 0 0 1 0 2l-6 6"/><path d="M6.5 11.5l6 6"/>',
      line: '<line x1="5" y1="19" x2="19" y2="5"/><circle cx="5" cy="19" r="1.5"/><circle cx="19" cy="5" r="1.5"/>',
      arrow: '<line x1="5" y1="19" x2="19" y2="5"/><polyline points="10 5 19 5 19 14"/>',
      rect: '<rect x="4" y="6" width="16" height="12" rx="2"/>',
      ellipse: '<ellipse cx="12" cy="12" rx="9" ry="6.5"/>',
      text: '<polyline points="4 7 4 4 20 4 20 7"/><line x1="12" y1="4" x2="12" y2="20"/><line x1="8" y1="20" x2="16" y2="20"/>',
      undo: '<path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-15-6.7L3 13"/>',
      redo: '<path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 15-6.7L21 13"/>',
      trash: '<polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/>',
      download: '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>',
      moon: '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>',
      sun: '<circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="6.34" y2="17.66"/><line x1="17.66" y1="6.34" x2="19.07" y2="4.93"/>',
      grid: '<circle cx="6" cy="6" r="1"/><circle cx="12" cy="6" r="1"/><circle cx="18" cy="6" r="1"/><circle cx="6" cy="12" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="18" cy="12" r="1"/><circle cx="6" cy="18" r="1"/><circle cx="12" cy="18" r="1"/><circle cx="18" cy="18" r="1"/>',
    };
    const svg = (name) => `<svg viewBox="0 0 24 24">${ICONS[name]}</svg>`;
  
    // ---------- State ----------
    const canvas = document.getElementById('board');
    const ctx = canvas.getContext('2d');
    const textInput = document.getElementById('textInput');
  
    let tool = 'pen';
    let color = '#1a1c20';
    let size = 4;
    let darkBoard = false;
    let showGrid = true;
  
    let shapes = [];       // committed shapes
    let redoStack = [];
    let current = null;    // shape being drawn
    let drawing = false;
    let spaceDown = false;
    let panning = false;
    let panStart = null;
  
    // view transform (pan + zoom)
    let view = { x: 0, y: 0, scale: 1 };
  
    const COLORS = ['#1a1c20', '#ffffff', '#ff5d5d', '#ff9f40', '#ffd54f', '#4caf7d', '#4f8cff', '#a06bff', '#ff6bb5'];
  
    const bgColor = () => darkBoard ? '#17181c' : '#f6f7f9';
    const gridColor = () => darkBoard ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.07)';
  
    // ---------- Canvas sizing ----------
    function resize() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width = innerWidth * dpr;
      canvas.height = innerHeight * dpr;
      canvas.style.width = innerWidth + 'px';
      canvas.style.height = innerHeight + 'px';
      render();
    }
    window.addEventListener('resize', resize);
  
    // ---------- Coordinate helpers ----------
    const toWorld = (sx, sy) => ({ x: (sx - view.x) / view.scale, y: (sy - view.y) / view.scale });
  
    // ---------- Rendering ----------
    function render() {
      const dpr = window.devicePixelRatio || 1;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.fillStyle = bgColor();
      ctx.fillRect(0, 0, innerWidth, innerHeight);
  
      if (showGrid) drawGrid();
  
      ctx.setTransform(dpr * view.scale, 0, 0, dpr * view.scale, dpr * view.x, dpr * view.y);
      for (const s of shapes) drawShape(s);
      if (current) drawShape(current);
    }
  
    function drawGrid() {
      const step = 28 * view.scale;
      if (step < 9) return;
      ctx.fillStyle = gridColor();
      const ox = ((view.x % step) + step) % step;
      const oy = ((view.y % step) + step) % step;
      for (let x = ox; x < innerWidth; x += step) {
        for (let y = oy; y < innerHeight; y += step) {
          ctx.beginPath();
          ctx.arc(x, y, 1, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }
  
    function drawShape(s) {
      ctx.save();
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.lineWidth = s.size;
      ctx.strokeStyle = s.color;
      ctx.globalAlpha = s.alpha ?? 1;
  
      if (s.type === 'path') {
        const p = s.points;
        if (p.length === 1) {
          ctx.beginPath();
          ctx.arc(p[0].x, p[0].y, s.size / 2, 0, Math.PI * 2);
          ctx.fillStyle = s.color;
          ctx.fill();
        } else {
          ctx.beginPath();
          ctx.moveTo(p[0].x, p[0].y);
          for (let i = 1; i < p.length - 1; i++) {
            const mx = (p[i].x + p[i + 1].x) / 2;
            const my = (p[i].y + p[i + 1].y) / 2;
            ctx.quadraticCurveTo(p[i].x, p[i].y, mx, my);
          }
          const last = p[p.length - 1];
          ctx.lineTo(last.x, last.y);
          ctx.stroke();
        }
      } else if (s.type === 'line') {
        ctx.beginPath();
        ctx.moveTo(s.x1, s.y1);
        ctx.lineTo(s.x2, s.y2);
        ctx.stroke();
      } else if (s.type === 'arrow') {
        ctx.beginPath();
        ctx.moveTo(s.x1, s.y1);
        ctx.lineTo(s.x2, s.y2);
        ctx.stroke();
        const ang = Math.atan2(s.y2 - s.y1, s.x2 - s.x1);
        const hl = Math.max(10, s.size * 3.2);
        ctx.beginPath();
        ctx.moveTo(s.x2, s.y2);
        ctx.lineTo(s.x2 - hl * Math.cos(ang - 0.45), s.y2 - hl * Math.sin(ang - 0.45));
        ctx.moveTo(s.x2, s.y2);
        ctx.lineTo(s.x2 - hl * Math.cos(ang + 0.45), s.y2 - hl * Math.sin(ang + 0.45));
        ctx.stroke();
      } else if (s.type === 'rect') {
        const r = Math.min(8, Math.abs(s.x2 - s.x1) / 4, Math.abs(s.y2 - s.y1) / 4);
        const x = Math.min(s.x1, s.x2), y = Math.min(s.y1, s.y2);
        const w = Math.abs(s.x2 - s.x1), h = Math.abs(s.y2 - s.y1);
        ctx.beginPath();
        ctx.roundRect(x, y, w, h, r);
        ctx.stroke();
      } else if (s.type === 'ellipse') {
        ctx.beginPath();
        ctx.ellipse((s.x1 + s.x2) / 2, (s.y1 + s.y2) / 2, Math.abs(s.x2 - s.x1) / 2, Math.abs(s.y2 - s.y1) / 2, 0, 0, Math.PI * 2);
        ctx.stroke();
      } else if (s.type === 'text') {
        ctx.font = `${s.fontSize}px Inter, -apple-system, sans-serif`;
        ctx.fillStyle = s.color;
        ctx.textBaseline = 'top';
        const lines = s.text.split('\n');
        lines.forEach((line, i) => ctx.fillText(line, s.x, s.y + i * s.fontSize * 1.3));
      }
      ctx.restore();
    }
  
    // ---------- Undo / Redo ----------
    function commit(shape) {
      shapes.push(shape);
      redoStack = [];
      updateHistoryButtons();
    }
    function undo() {
      if (!shapes.length) return;
      redoStack.push(shapes.pop());
      updateHistoryButtons();
      render();
    }
    function redo() {
      if (!redoStack.length) return;
      shapes.push(redoStack.pop());
      updateHistoryButtons();
      render();
    }
    function clearBoard() {
      if (!shapes.length) return;
      redoStack = shapes.slice().reverse();
      shapes = [];
      updateHistoryButtons();
      render();
      toast('Board cleared — undo to restore');
    }
    function updateHistoryButtons() {
      document.getElementById('btn-undo').disabled = !shapes.length;
      document.getElementById('btn-redo').disabled = !redoStack.length;
    }
  
    // ---------- Pointer handling ----------
    function startShape(wx, wy) {
      const isEraser = tool === 'eraser';
      const isHighlighter = tool === 'highlighter';
      if (tool === 'pen' || isEraser || isHighlighter) {
        current = {
          type: 'path',
          points: [{ x: wx, y: wy }],
          color: isEraser ? bgColor() : color,
          size: isEraser ? size * 4 : isHighlighter ? size * 3.5 : size,
          alpha: isHighlighter ? 0.35 : 1,
          eraser: isEraser,
        };
      } else if (['line', 'arrow', 'rect', 'ellipse'].includes(tool)) {
        current = { type: tool, x1: wx, y1: wy, x2: wx, y2: wy, color, size };
      }
    }
  
    canvas.addEventListener('pointerdown', (e) => {
      if (e.button === 1 || spaceDown) {
        panning = true;
        panStart = { x: e.clientX - view.x, y: e.clientY - view.y };
        canvas.style.cursor = 'grabbing';
        canvas.setPointerCapture(e.pointerId);
        return;
      }
      if (e.button !== 0) return;
      commitText();
      const w = toWorld(e.clientX, e.clientY);
      if (tool === 'text') { placeTextInput(e.clientX, e.clientY, w); return; }
      drawing = true;
      canvas.setPointerCapture(e.pointerId);
      startShape(w.x, w.y);
      render();
    });
  
    canvas.addEventListener('pointermove', (e) => {
      if (panning) {
        view.x = e.clientX - panStart.x;
        view.y = e.clientY - panStart.y;
        render();
        return;
      }
      if (!drawing || !current) return;
      const events = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
      for (const ev of events) {
        const w = toWorld(ev.clientX, ev.clientY);
        if (current.type === 'path') {
          current.points.push({ x: w.x, y: w.y });
        } else {
          current.x2 = w.x; current.y2 = w.y;
          if (e.shiftKey && (current.type === 'rect' || current.type === 'ellipse')) {
            const dx = current.x2 - current.x1, dy = current.y2 - current.y1;
            const m = Math.max(Math.abs(dx), Math.abs(dy));
            current.x2 = current.x1 + Math.sign(dx || 1) * m;
            current.y2 = current.y1 + Math.sign(dy || 1) * m;
          }
          if (e.shiftKey && (current.type === 'line' || current.type === 'arrow')) {
            const dx = current.x2 - current.x1, dy = current.y2 - current.y1;
            const ang = Math.round(Math.atan2(dy, dx) / (Math.PI / 4)) * (Math.PI / 4);
            const len = Math.hypot(dx, dy);
            current.x2 = current.x1 + len * Math.cos(ang);
            current.y2 = current.y1 + len * Math.sin(ang);
          }
        }
      }
      render();
    });
  
    function endStroke() {
      if (panning) { panning = false; canvas.style.cursor = spaceDown ? 'grab' : 'crosshair'; return; }
      if (!drawing) return;
      drawing = false;
      if (current) { commit(current); current = null; }
      render();
    }
    canvas.addEventListener('pointerup', endStroke);
    canvas.addEventListener('pointercancel', endStroke);
  
    // ---------- Pan & zoom ----------
    window.addEventListener('wheel', (e) => {
      if (e.target !== canvas) return;
      e.preventDefault();
      if (e.ctrlKey || e.metaKey) {
        const factor = Math.exp(-e.deltaY * 0.0015);
        const newScale = Math.min(5, Math.max(0.2, view.scale * factor));
        const k = newScale / view.scale;
        view.x = e.clientX - k * (e.clientX - view.x);
        view.y = e.clientY - k * (e.clientY - view.y);
        view.scale = newScale;
      } else {
        view.x -= e.deltaX;
        view.y -= e.deltaY;
      }
      render();
    }, { passive: false });
  
    // ---------- Text tool ----------
    let textWorldPos = null;
    function placeTextInput(sx, sy, w) {
      textWorldPos = w;
      const fs = Math.max(14, size * 5) * view.scale;
      textInput.style.display = 'block';
      textInput.style.left = sx + 'px';
      textInput.style.top = (sy - fs * 0.7) + 'px';
      textInput.style.fontSize = fs + 'px';
      textInput.style.color = color;
      textInput.value = '';
      setTimeout(() => textInput.focus(), 0);
    }
    function commitText() {
      if (textInput.style.display !== 'block') return;
      const text = textInput.value.trim();
      textInput.style.display = 'none';
      if (text && textWorldPos) {
        commit({ type: 'text', text, x: textWorldPos.x, y: textWorldPos.y - Math.max(14, size * 5) * 0.7, color, fontSize: Math.max(14, size * 5) });
        render();
      }
      textWorldPos = null;
    }
    textInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); commitText(); }
      if (e.key === 'Escape') { textInput.value = ''; commitText(); }
      e.stopPropagation();
    });
    textInput.addEventListener('blur', commitText);
  
    // ---------- Export PNG ----------
    function exportPNG() {
      if (!shapes.length) { toast('Nothing to export yet'); return; }
      // bounding box of all shapes
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      const grow = (x, y, r) => {
        minX = Math.min(minX, x - r); minY = Math.min(minY, y - r);
        maxX = Math.max(maxX, x + r); maxY = Math.max(maxY, y + r);
      };
      for (const s of shapes) {
        if (s.type === 'path') for (const p of s.points) grow(p.x, p.y, s.size);
        else if (s.type === 'text') {
          const lines = s.text.split('\n');
          const wmax = Math.max(...lines.map(l => l.length)) * s.fontSize * 0.62;
          grow(s.x, s.y, 0); grow(s.x + wmax, s.y + lines.length * s.fontSize * 1.3, 0);
        } else grow(s.x1, s.y1, s.size + 12), grow(s.x2, s.y2, s.size + 12);
      }
      const pad = 40;
      const w = Math.ceil(maxX - minX + pad * 2), h = Math.ceil(maxY - minY + pad * 2);
      const off = document.createElement('canvas');
      const scale = 2;
      off.width = w * scale; off.height = h * scale;
      const octx = off.getContext('2d');
      octx.fillStyle = bgColor();
      octx.fillRect(0, 0, off.width, off.height);
      octx.setTransform(scale, 0, 0, scale, (pad - minX) * scale, (pad - minY) * scale);
  
      const mainCtx = ctx;
      // temporarily draw onto offscreen using drawShape
      const realCtx = window.__wbctx;
      const saved = Object.getOwnPropertyDescriptor(window, 'noop');
      // simple approach: swap ctx reference
      exportDraw(octx);
  
      const a = document.createElement('a');
      a.download = 'whiteboard-' + new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-') + '.png';
      a.href = off.toDataURL('image/png');
      a.click();
      toast('Exported as PNG ✓');
    }
    function exportDraw(octx) {
      const orig = ctx;
      // re-implement by temporarily rebinding: draw each shape with octx
      const drawWith = (target, fn) => fn(target);
      for (const s of shapes) drawShapeOn(octx, s);
    }
    function drawShapeOn(c, s) {
      const saved = ctx;
      // Use the same routine by monkey-free duplication: call drawShape with swapped context
      drawShapeGeneric(c, s);
    }
    function drawShapeGeneric(c, s) {
      c.save();
      c.lineCap = 'round'; c.lineJoin = 'round';
      c.lineWidth = s.size; c.strokeStyle = s.color;
      c.globalAlpha = s.alpha ?? 1;
      if (s.type === 'path') {
        const p = s.points;
        if (p.length === 1) { c.beginPath(); c.arc(p[0].x, p[0].y, s.size / 2, 0, Math.PI * 2); c.fillStyle = s.color; c.fill(); }
        else {
          c.beginPath(); c.moveTo(p[0].x, p[0].y);
          for (let i = 1; i < p.length - 1; i++) c.quadraticCurveTo(p[i].x, p[i].y, (p[i].x + p[i+1].x)/2, (p[i].y + p[i+1].y)/2);
          c.lineTo(p[p.length-1].x, p[p.length-1].y); c.stroke();
        }
      } else if (s.type === 'line') { c.beginPath(); c.moveTo(s.x1, s.y1); c.lineTo(s.x2, s.y2); c.stroke(); }
      else if (s.type === 'arrow') {
        c.beginPath(); c.moveTo(s.x1, s.y1); c.lineTo(s.x2, s.y2); c.stroke();
        const ang = Math.atan2(s.y2 - s.y1, s.x2 - s.x1), hl = Math.max(10, s.size * 3.2);
        c.beginPath();
        c.moveTo(s.x2, s.y2); c.lineTo(s.x2 - hl * Math.cos(ang - 0.45), s.y2 - hl * Math.sin(ang - 0.45));
        c.moveTo(s.x2, s.y2); c.lineTo(s.x2 - hl * Math.cos(ang + 0.45), s.y2 - hl * Math.sin(ang + 0.45));
        c.stroke();
      } else if (s.type === 'rect') {
        const r = Math.min(8, Math.abs(s.x2 - s.x1) / 4, Math.abs(s.y2 - s.y1) / 4);
        c.beginPath(); c.roundRect(Math.min(s.x1, s.x2), Math.min(s.y1, s.y2), Math.abs(s.x2 - s.x1), Math.abs(s.y2 - s.y1), r); c.stroke();
      } else if (s.type === 'ellipse') {
        c.beginPath(); c.ellipse((s.x1 + s.x2)/2, (s.y1 + s.y2)/2, Math.abs(s.x2 - s.x1)/2, Math.abs(s.y2 - s.y1)/2, 0, 0, Math.PI * 2); c.stroke();
      } else if (s.type === 'text') {
        c.font = `${s.fontSize}px Inter, -apple-system, sans-serif`;
        c.fillStyle = s.color; c.textBaseline = 'top';
        s.text.split('\n').forEach((line, i) => c.fillText(line, s.x, s.y + i * s.fontSize * 1.3));
      }
      c.restore();
    }
  
    // ---------- UI construction ----------
    const TOOLS = [
      { id: 'pen', tip: 'Pen', key: 'P' },
      { id: 'highlighter', tip: 'Highlighter', key: 'H' },
      { id: 'eraser', tip: 'Eraser', key: 'E' },
      null,
      { id: 'line', tip: 'Line', key: 'L' },
      { id: 'arrow', tip: 'Arrow', key: 'A' },
      { id: 'rect', tip: 'Rectangle', key: 'R' },
      { id: 'ellipse', tip: 'Ellipse', key: 'O' },
      { id: 'text', tip: 'Text', key: 'T' },
    ];
  
    const toolbar = document.getElementById('toolbar');
    for (const t of TOOLS) {
      if (!t) { toolbar.insertAdjacentHTML('beforeend', '<div class="divider"></div>'); continue; }
      const b = document.createElement('button');
      b.className = 'tool' + (t.id === tool ? ' active' : '');
      b.id = 'tool-' + t.id;
      b.setAttribute('data-tip', `${t.tip}  ·  ${t.key}`);
      b.innerHTML = svg(t.id);
      b.onclick = () => setTool(t.id);
      toolbar.appendChild(b);
    }
    toolbar.insertAdjacentHTML('beforeend', '<div class="divider"></div>');
    const undoBtn = mkBtn('btn-undo', 'undo', 'Undo  ·  Ctrl+Z', undo);
    const redoBtn = mkBtn('btn-redo', 'redo', 'Redo  ·  Ctrl+Y', redo);
    toolbar.append(undoBtn, redoBtn);
  
    const actions = document.getElementById('actions');
    actions.append(
      mkBtn('btn-theme', darkBoard ? 'sun' : 'moon', 'Toggle dark board', toggleTheme),
      mkBtn('btn-grid', 'grid', 'Toggle grid', () => { showGrid = !showGrid; document.getElementById('btn-grid').classList.toggle('active', showGrid); render(); }),
      mkBtn('btn-export', 'download', 'Export PNG', exportPNG),
      mkBtn('btn-clear', 'trash', 'Clear board', clearBoard, 'danger'),
    );
    document.getElementById('btn-grid').classList.add('active');
  
    function mkBtn(id, icon, tip, fn, extra) {
      const b = document.createElement('button');
      b.className = 'tool' + (extra ? ' ' + extra : '');
      b.id = id;
      b.setAttribute('data-tip', tip);
      b.innerHTML = svg(icon);
      b.onclick = fn;
      return b;
    }
  
    function setTool(id) {
      tool = id;
      document.querySelectorAll('#toolbar .tool').forEach(b => b.classList.toggle('active', b.id === 'tool-' + id));
      canvas.style.cursor = id === 'text' ? 'text' : 'crosshair';
    }
  
    function toggleTheme() {
      darkBoard = !darkBoard;
      document.body.classList.toggle('dark-board', darkBoard);
      document.getElementById('btn-theme').innerHTML = svg(darkBoard ? 'sun' : 'moon');
      // keep eraser strokes matching new background
      for (const s of shapes) if (s.eraser) s.color = bgColor();
      // auto-swap default ink for visibility
      if (!darkBoard && color === '#ffffff') selectColor('#1a1c20');
      if (darkBoard && color === '#1a1c20') selectColor('#ffffff');
      render();
    }
  
    // Swatches
    const swatchWrap = document.getElementById('swatches');
    for (const c of COLORS) {
      const b = document.createElement('button');
      b.className = 'swatch' + (c === '#ffffff' ? ' white-swatch' : '') + (c === color ? ' active' : '');
      b.style.background = c;
      b.dataset.color = c;
      b.onclick = () => selectColor(c);
      swatchWrap.appendChild(b);
    }
    const customWrap = document.createElement('div');
    customWrap.id = 'customColor';
    customWrap.innerHTML = '<input type="color" value="#4f8cff" />';
    customWrap.querySelector('input').addEventListener('input', (e) => selectColor(e.target.value, true));
    swatchWrap.appendChild(customWrap);
  
    function selectColor(c, custom = false) {
      color = c;
      document.querySelectorAll('.swatch').forEach(s => s.classList.toggle('active', !custom && s.dataset.color === c));
      customWrap.classList.toggle('active', custom);
      if (custom) customWrap.style.background = c;
      updateSizeDot();
    }
  
    // Size
    const sizeSlider = document.getElementById('sizeSlider');
    const sizeDot = document.getElementById('sizeDot');
    sizeSlider.addEventListener('input', () => { size = +sizeSlider.value; updateSizeDot(); });
    function updateSizeDot() {
      const d = Math.max(4, Math.min(26, size * 0.9 + 3));
      sizeDot.style.width = d + 'px';
      sizeDot.style.height = d + 'px';
      sizeDot.style.background = color === '#ffffff' ? '#e8eaee' : color;
    }
    updateSizeDot();
  
    // ---------- Keyboard shortcuts ----------
    window.addEventListener('keydown', (e) => {
      if (e.target === textInput) return;
      if (e.code === 'Space' && !spaceDown) { spaceDown = true; if (!drawing) canvas.style.cursor = 'grab'; e.preventDefault(); }
      const mod = e.ctrlKey || e.metaKey;
      if (mod && e.key.toLowerCase() === 'z') { e.preventDefault(); e.shiftKey ? redo() : undo(); return; }
      if (mod && e.key.toLowerCase() === 'y') { e.preventDefault(); redo(); return; }
      if (mod && e.key.toLowerCase() === 's') { e.preventDefault(); exportPNG(); return; }
      if (mod) return;
      const map = { p: 'pen', h: 'highlighter', e: 'eraser', l: 'line', a: 'arrow', r: 'rect', o: 'ellipse', t: 'text' };
      const t = map[e.key.toLowerCase()];
      if (t) setTool(t);
      if (e.key === 'Delete' || e.key === 'Backspace') clearBoard();
      if (e.key === '0') { view = { x: 0, y: 0, scale: 1 }; render(); }
    });
    window.addEventListener('keyup', (e) => {
      if (e.code === 'Space') { spaceDown = false; if (!panning) canvas.style.cursor = tool === 'text' ? 'text' : 'crosshair'; }
    });
  
    // ---------- Toast ----------
    let toastTimer;
    function toast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
    }
  
    // fade hint after a while
    setTimeout(() => { document.getElementById('hint').style.opacity = '0'; }, 9000);
  
    updateHistoryButtons();
    resize();
  })();
  </script>
  </body>
  </html>
