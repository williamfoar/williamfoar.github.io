  <!doctype html>
  <html lang="en">
  <head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Neural Network Playground</title>
  <style>
    :root {
      --bg: #0b0e14;
      --panel: #131a26;
      --panel2: #1b2434;
      --border: #263349;
      --text: #e6ecf5;
      --muted: #8b9bb4;
      --accent: #4ade80;
      --accent-dim: #22c55e;
      --danger: #f87171;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font: 14px/1.45 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    .layout { display: flex; height: 100vh; }
    /* ---------- Sidebar ---------- */
    .sidebar {
      width: 292px; min-width: 292px; overflow-y: auto;
      background: var(--panel); border-right: 1px solid var(--border);
      padding: 14px; display: flex; flex-direction: column; gap: 14px;
    }
    .section { background: var(--panel2); border: 1px solid var(--border); border-radius: 10px; padding: 12px; }
    .section h3 {
      margin: 0 0 10px; font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
      color: var(--muted); font-weight: 600;
    }
    .row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
    .row:last-child { margin-bottom: 0; }
    .row label { color: var(--muted); font-size: 12.5px; white-space: nowrap; }
    input[type="text"], input[type="number"], select {
      background: var(--bg); color: var(--text); border: 1px solid var(--border);
      border-radius: 6px; padding: 5px 8px; font: inherit; font-size: 13px; width: 118px;
    }
    input:focus, select:focus { outline: 1px solid var(--accent-dim); }
    button {
      background: var(--panel); color: var(--text); border: 1px solid var(--border);
      border-radius: 7px; padding: 7px 10px; font: inherit; font-size: 13px; cursor: pointer;
    }
    button:hover:not(:disabled) { border-color: var(--accent-dim); }
    button:disabled { opacity: .45; cursor: not-allowed; }
    .btn-primary { background: var(--accent-dim); border-color: var(--accent-dim); color: #06220f; font-weight: 600; }
    .btn-primary:hover:not(:disabled) { background: var(--accent); }
    .btn-danger { color: var(--danger); }
    .btn-row { display: flex; gap: 8px; }
    .btn-row button { flex: 1; }
    .hint { color: var(--muted); font-size: 11.5px; margin-top: 8px; }
    /* class chips */
    .chips { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 10px; }
    .chip {
      display: flex; align-items: center; gap: 6px; padding: 4px 8px; border-radius: 999px;
      border: 2px solid transparent; background: var(--bg); cursor: pointer; user-select: none; font-size: 12.5px;
    }
    .chip.selected { border-color: var(--accent); }
    .chip .dot { width: 12px; height: 12px; border-radius: 50%; }
    .chip .x { color: var(--muted); font-size: 13px; padding: 0 1px; }
    .chip .x:hover { color: var(--danger); }
    /* ---------- Main ---------- */
    .main { flex: 1; display: flex; flex-direction: column; align-items: center; overflow-y: auto; padding: 14px; gap: 10px; }
    .canvas-wrap { position: relative; width: min(92vh - 210px, 100%, 640px); }
    canvas#board {
      width: 100%; display: block; border-radius: 10px; border: 1px solid var(--border);
      background: #0e1420; cursor: crosshair;
    }
    .playback {
      width: min(92vh - 210px, 100%, 640px); display: flex; align-items: center; gap: 10px;
      background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 8px 12px;
    }
    .playback input[type="range"] { flex: 1; accent-color: var(--accent); }
    .playback .epoch-label { font-variant-numeric: tabular-nums; font-size: 12.5px; color: var(--muted); min-width: 118px; text-align: right; }
    .playback button { min-width: 42px; }
    .chart-wrap { width: min(92vh - 210px, 100%, 640px); background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; }
    canvas#chart { width: 100%; height: 110px; display: block; }
    .stats { font-size: 12.5px; color: var(--muted); margin-top: 6px; font-variant-numeric: tabular-nums; }
    .stats b { color: var(--text); font-weight: 600; }
    @media (max-width: 760px) {
      .layout { flex-direction: column; height: auto; }
      .sidebar { width: 100%; min-width: 0; }
    }
  </style>
  </head>
  <body>
  <div class="layout">
    <!-- ======================= SIDEBAR ======================= -->
    <aside class="sidebar">
      <div class="section">
        <h3>Data · Classes</h3>
        <div class="chips" id="chips"></div>
        <div class="btn-row">
          <button id="addClassBtn">+ Class</button>
          <button id="clearBtn" class="btn-danger">Clear points</button>
        </div>
        <div class="row" style="margin-top:10px;">
          <label>Preset</label>
          <select id="preset">
            <option value="">— none —</option>
            <option value="xor">XOR quadrants</option>
            <option value="circles">Concentric circles</option>
            <option value="spiral">Spiral</option>
            <option value="blobs">Gaussian blobs</option>
          </select>
        </div>
        <div class="row">
          <label>Points / class</label>
          <input type="number" id="presetN" value="60" min="10" max="500" />
        </div>
        <button id="genBtn" style="width:100%;">Generate preset</button>
        <div class="hint">🖱 Click canvas to add a point of the selected class.<br/>Right-click (or Shift+click) near a point to delete it.</div>
      </div>
  
      <div class="section">
        <h3>Network architecture</h3>
        <div class="row">
          <label>Hidden layers</label>
          <input type="text" id="hidden" value="16,16" title="Comma-separated neuron counts, e.g. 8,8,4" />
        </div>
        <div class="row">
          <label>Activation</label>
          <select id="activation">
            <option value="tanh" selected>tanh</option>
            <option value="relu">ReLU</option>
            <option value="lrelu">Leaky ReLU</option>
            <option value="elu">ELU</option>
            <option value="sigmoid">sigmoid</option>
          </select>
        </div>
        <div class="row">
          <label>Weight seed</label>
          <input type="number" id="seed" value="42" />
        </div>
        <div class="hint">Input: (x, y) · Output: softmax over classes.</div>
      </div>
  
      <div class="section">
        <h3>Training</h3>
        <div class="row">
          <label>Epochs</label>
          <input type="number" id="epochs" value="300" min="1" max="20000" />
        </div>
        <div class="row">
          <label>Learning rate</label>
          <input type="number" id="lr" value="0.01" step="0.001" min="0.00001" />
        </div>
        <div class="row">
          <label>Optimizer</label>
          <select id="optimizer">
            <option value="adam" selected>Adam</option>
            <option value="momentum">SGD + momentum</option>
            <option value="sgd">SGD</option>
          </select>
        </div>
        <div class="row">
          <label>Batch size</label>
          <input type="number" id="batch" value="16" min="0" title="0 = full batch" />
        </div>
        <div class="row">
          <label>L2 regularization</label>
          <input type="number" id="l2" value="0" step="0.0001" min="0" />
        </div>
        <div class="row">
          <label>Snapshot frames</label>
          <input type="number" id="frames" value="80" min="2" max="400" title="Max boundary snapshots kept for playback" />
        </div>
        <div class="row">
          <label>Boundary res.</label>
          <select id="res">
            <option value="120">120 × 120</option>
            <option value="200" selected>200 × 200</option>
            <option value="300">300 × 300</option>
          </select>
        </div>
        <div class="btn-row" style="margin-top:10px;">
          <button id="trainBtn" class="btn-primary">▶ Train</button>
          <button id="stopBtn" disabled>■ Stop</button>
        </div>
      </div>
    </aside>
  
    <!-- ======================= MAIN ======================= -->
    <main class="main">
      <div class="canvas-wrap"><canvas id="board" width="640" height="640"></canvas></div>
      <div class="playback">
        <button id="playBtn" disabled>▶</button>
        <input type="range" id="scrub" min="0" max="0" value="0" disabled />
        <span class="epoch-label" id="epochLabel">epoch — / —</span>
      </div>
      <div class="chart-wrap">
        <canvas id="chart" width="640" height="110"></canvas>
        <div class="stats" id="stats">Place some points, then hit <b>Train</b>. ✨</div>
      </div>
    </main>
  </div>
  
  <script>
  "use strict";
  /* ============================================================
     Neural Network Playground — single-file, zero-dependency.
     ============================================================ */
  
  /* ---------- utils ---------- */
  function mulberry32(seed) {
    let a = seed >>> 0;
    return function () {
      a |= 0; a = (a + 0x6D2B79F5) | 0;
      let t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }
  function gaussianFactory(rnd) {
    return function () {
      let u = 0, v = 0;
      while (u === 0) u = rnd();
      while (v === 0) v = rnd();
      return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
    };
  }
  function hexToRgb(h) {
    return [parseInt(h.slice(1, 3), 16), parseInt(h.slice(3, 5), 16), parseInt(h.slice(5, 7), 16)];
  }
  
  /* ---------- activations ---------- */
  const ACTS = {
    tanh:    { f: z => Math.tanh(z),                      df: (z, a) => 1 - a * a,                heInit: false },
    sigmoid: { f: z => 1 / (1 + Math.exp(-z)),            df: (z, a) => a * (1 - a),              heInit: false },
    relu:    { f: z => (z > 0 ? z : 0),                   df: (z, a) => (z > 0 ? 1 : 0),          heInit: true  },
    lrelu:   { f: z => (z > 0 ? z : 0.01 * z),            df: (z, a) => (z > 0 ? 1 : 0.01),       heInit: true  },
    elu:     { f: z => (z > 0 ? z : Math.exp(z) - 1),     df: (z, a) => (z > 0 ? 1 : a + 1),      heInit: true  },
  };
  
  /* ---------- network ---------- */
  function buildNet(sizes, actName, seed) {
    const rnd = mulberry32(seed);
    const gauss = gaussianFactory(rnd);
    const he = ACTS[actName].heInit;
    const W = [], b = [];
    for (let l = 1; l < sizes.length; l++) {
      const fanIn = sizes[l - 1], fanOut = sizes[l];
      const scale = Math.sqrt((he ? 2 : 1) / fanIn);
      const w = [];
      for (let j = 0; j < fanOut; j++) {
        const row = new Float64Array(fanIn);
        for (let i = 0; i < fanIn; i++) row[i] = gauss() * scale;
        w.push(row);
      }
      W.push(w);
      b.push(new Float64Array(fanOut));
    }
    return { sizes, act: actName, W, b, adamT: 0, opt: null };
  }
  function zerosLike(net) {
    return {
      W: net.W.map(l => l.map(r => new Float64Array(r.length))),
      b: net.b.map(v => new Float64Array(v.length)),
    };
  }
  
  /* forward pass; returns { a: activations per layer, z: pre-activations, p: softmax probs } */
  function forward(net, x, y) {
    const act = ACTS[net.act];
    const L = net.W.length;
    const a = [Float64Array.from([x, y])];
    const z = [null];
    for (let l = 0; l < L; l++) {
      const w = net.W[l], bias = net.b[l], prev = a[l];
      const n = w.length;
      const zl = new Float64Array(n), al = new Float64Array(n);
      for (let j = 0; j < n; j++) {
        let s = bias[j];
        const row = w[j];
        for (let i = 0; i < prev.length; i++) s += row[i] * prev[i];
        zl[j] = s;
        al[j] = (l < L - 1) ? act.f(s) : s; // last layer linear → softmax
      }
      z.push(zl); a.push(al);
    }
    // softmax
    const out = a[L];
    let mx = -Infinity;
    for (let j = 0; j < out.length; j++) if (out[j] > mx) mx = out[j];
    let sum = 0;
    const p = new Float64Array(out.length);
    for (let j = 0; j < out.length; j++) { p[j] = Math.exp(out[j] - mx); sum += p[j]; }
    for (let j = 0; j < out.length; j++) p[j] /= sum;
    return { a, z, p };
  }
  
  /* accumulate gradients for one sample into g */
  function backward(net, cache, label, g) {
    const act = ACTS[net.act];
    const L = net.W.length;
    const { a, z, p } = cache;
    let delta = new Float64Array(p.length);
    for (let j = 0; j < p.length; j++) delta[j] = p[j] - (j === label ? 1 : 0);
    for (let l = L - 1; l >= 0; l--) {
      const prev = a[l], gW = g.W[l], gb = g.b[l];
      for (let j = 0; j < delta.length; j++) {
        const d = delta[j], row = gW[j];
        for (let i = 0; i < prev.length; i++) row[i] += d * prev[i];
        gb[j] += d;
      }
      if (l > 0) {
        const w = net.W[l];
        const nd = new Float64Array(prev.length);
        for (let i = 0; i < prev.length; i++) {
          let s = 0;
          for (let j = 0; j < delta.length; j++) s += w[j][i] * delta[j];
          nd[i] = s * act.df(z[l][i], a[l][i]);
        }
        delta = nd;
      }
    }
  }
  
  /* apply averaged gradients with the chosen optimizer */
  function applyGrads(net, g, cfg, batchN) {
    const { lr, l2, optimizer } = cfg;
    if (!net.opt) {
      net.opt = { mW: zerosLike(net), mB: null, vW: null };
      net.opt.m = zerosLike(net); // first moment / momentum
      net.opt.v = zerosLike(net); // second moment (adam)
    }
    const m = net.opt.m, v = net.opt.v;
    if (optimizer === "adam") net.adamT++;
    const beta1 = 0.9, beta2 = 0.999, eps = 1e-8;
    const bc1 = optimizer === "adam" ? 1 - Math.pow(beta1, net.adamT) : 1;
    const bc2 = optimizer === "adam" ? 1 - Math.pow(beta2, net.adamT) : 1;
  
    for (let l = 0; l < net.W.length; l++) {
      for (let j = 0; j < net.W[l].length; j++) {
        const wRow = net.W[l][j], gRow = g.W[l][j], mRow = m.W[l][j], vRow = v.W[l][j];
        for (let i = 0; i < wRow.length; i++) {
          let grad = gRow[i] / batchN + l2 * wRow[i];
          if (optimizer === "sgd") {
            wRow[i] -= lr * grad;
          } else if (optimizer === "momentum") {
            mRow[i] = 0.9 * mRow[i] + grad;
            wRow[i] -= lr * mRow[i];
          } else {
            mRow[i] = beta1 * mRow[i] + (1 - beta1) * grad;
            vRow[i] = beta2 * vRow[i] + (1 - beta2) * grad * grad;
            wRow[i] -= lr * (mRow[i] / bc1) / (Math.sqrt(vRow[i] / bc2) + eps);
          }
          gRow[i] = 0;
        }
        // bias
        let gb = g.b[l][j] / batchN;
        if (optimizer === "sgd") {
          net.b[l][j] -= lr * gb;
        } else if (optimizer === "momentum") {
          m.b[l][j] = 0.9 * m.b[l][j] + gb;
          net.b[l][j] -= lr * m.b[l][j];
        } else {
          m.b[l][j] = beta1 * m.b[l][j] + (1 - beta1) * gb;
          v.b[l][j] = beta2 * v.b[l][j] + (1 - beta2) * gb * gb;
          net.b[l][j] -= lr * (m.b[l][j] / bc1) / (Math.sqrt(v.b[l][j] / bc2) + eps);
        }
        g.b[l][j] = 0;
      }
    }
  }
  
  /* ============================================================
     App state
     ============================================================ */
  const PALETTE = ["#ff6b6b", "#4dabf7", "#51cf66", "#ffd43b", "#cc5de8", "#ff922b", "#20c997", "#f783ac"];
  const state = {
    classes: [{ color: PALETTE[0] }, { color: PALETTE[1] }],
    selected: 0,
    points: [],           // { x, y, c }  with x,y ∈ [-1, 1]
    snapshots: [],        // { epoch, img (ImageData), loss, acc }
    lossHist: [],         // { loss, acc } per epoch
    current: -1,          // snapshot index shown
    training: false,
    stopFlag: false,
    playTimer: null,
  };
  
  /* ---------- DOM ---------- */
  const $ = id => document.getElementById(id);
  const board = $("board"), bctx = board.getContext("2d");
  const chart = $("chart"), cctx = chart.getContext("2d");
  const off = document.createElement("canvas");   // offscreen boundary canvas
  const offCtx = off.getContext("2d");
  
  /* ---------- class chips ---------- */
  function renderChips() {
    const el = $("chips");
    el.innerHTML = "";
    state.classes.forEach((cls, idx) => {
      const chip = document.createElement("div");
      chip.className = "chip" + (idx === state.selected ? " selected" : "");
      const dot = document.createElement("span");
      dot.className = "dot";
      dot.style.background = cls.color;
      const name = document.createElement("span");
      name.textContent = "Class " + (idx + 1);
      chip.append(dot, name);
      if (state.classes.length > 2) {
        const x = document.createElement("span");
        x.className = "x";
        x.textContent = "✕";
        x.title = "Remove class (and its points)";
        x.onclick = e => { e.stopPropagation(); removeClass(idx); };
        chip.append(x);
      }
      chip.onclick = () => { state.selected = idx; renderChips(); };
      el.append(chip);
    });
    $("addClassBtn").disabled = state.classes.length >= PALETTE.length;
  }
  function removeClass(idx) {
    if (state.training) return;
    state.classes.splice(idx, 1);
    state.points = state.points.filter(p => p.c !== idx).map(p => ({ ...p, c: p.c > idx ? p.c - 1 : p.c }));
    if (state.selected >= state.classes.length) state.selected = state.classes.length - 1;
    invalidateModel();
    renderChips();
    redraw();
  }
  $("addClassBtn").onclick = () => {
    if (state.classes.length >= PALETTE.length || state.training) return;
    state.classes.push({ color: PALETTE[state.classes.length] });
    state.selected = state.classes.length - 1;
    invalidateModel();
    renderChips();
  };
  $("clearBtn").onclick = () => {
    if (state.training) return;
    state.points = [];
    invalidateModel();
    redraw();
    setStats("Canvas cleared. Click to add points!");
  };
  
  function invalidateModel() {
    state.snapshots = [];
    state.lossHist = [];
    state.current = -1;
    stopPlayback();
    $("scrub").max = 0; $("scrub").value = 0; $("scrub").disabled = true;
    $("playBtn").disabled = true;
    $("epochLabel").textContent = "epoch — / —";
    drawChart();
  }
  
  /* ---------- coordinates ---------- */
  const SZ = 640;
  const toPx = (x, y) => [ (x + 1) / 2 * SZ, (1 - (y + 1) / 2) * SZ ];
  const toXY = (px, py) => [ px / SZ * 2 - 1, (1 - py / SZ) * 2 - 1 ];
  
  function canvasPos(e) {
    const r = board.getBoundingClientRect();
    return [ (e.clientX - r.left) / r.width * SZ, (e.clientY - r.top) / r.height * SZ ];
  }
  board.addEventListener("click", e => {
    if (state.training) return;
    const [px, py] = canvasPos(e);
    if (e.shiftKey) { deleteNear(px, py); return; }
    const [x, y] = toXY(px, py);
    state.points.push({ x, y, c: state.selected });
    redraw();
  });
  board.addEventListener("contextmenu", e => {
    e.preventDefault();
    if (state.training) return;
    const [px, py] = canvasPos(e);
    deleteNear(px, py);
  });
  function deleteNear(px, py) {
    let best = -1, bestD = 18 * 18;
    state.points.forEach((p, i) => {
      const [qx, qy] = toPx(p.x, p.y);
      const d = (qx - px) ** 2 + (qy - py) ** 2;
      if (d < bestD) { bestD = d; best = i; }
    });
    if (best >= 0) { state.points.splice(best, 1); redraw(); }
  }
  
  /* ---------- presets ---------- */
  $("genBtn").onclick = () => {
    if (state.training) return;
    const kind = $("preset").value;
    if (!kind) { setStats("Pick a preset first."); return; }
    const n = Math.max(10, Math.min(500, +$("presetN").value || 60));
    const rnd = mulberry32(Date.now() & 0xffffffff);
    const gauss = gaussianFactory(rnd);
    const K = state.classes.length;
    const pts = [];
    if (kind === "xor") {
      for (let i = 0; i < n * 2; i++) {
        const x = rnd() * 1.8 - 0.9, y = rnd() * 1.8 - 0.9;
        if (Math.abs(x) < 0.04 || Math.abs(y) < 0.04) continue;
        pts.push({ x, y, c: (x * y > 0 ? 0 : 1) });
      }
    } else if (kind === "circles") {
      for (let c = 0; c < K; c++) {
        const r0 = 0.85 * (c + 0.5) / K;
        for (let i = 0; i < n; i++) {
          const t = rnd() * 2 * Math.PI;
          const r = r0 + gauss() * 0.045;
          pts.push({ x: r * Math.cos(t), y: r * Math.sin(t), c });
        }
      }
    } else if (kind === "spiral") {
      for (let c = 0; c < K; c++) {
        for (let i = 0; i < n; i++) {
          const t = i / n * 2.6 * Math.PI + (c * 2 * Math.PI / K);
          const r = 0.05 + 0.85 * i / n;
          pts.push({
            x: r * Math.cos(t) + gauss() * 0.03,
            y: r * Math.sin(t) + gauss() * 0.03,
            c,
          });
        }
      }
    } else if (kind === "blobs") {
      for (let c = 0; c < K; c++) {
        const ang = (c / K) * 2 * Math.PI + rnd() * 0.6;
        const cx = 0.55 * Math.cos(ang), cy = 0.55 * Math.sin(ang);
        for (let i = 0; i < n; i++) {
          pts.push({ x: cx + gauss() * 0.16, y: cy + gauss() * 0.16, c });
        }
      }
    }
    state.points = pts.filter(p => p.x > -1 && p.x < 1 && p.y > -1 && p.y < 1);
    invalidateModel();
    redraw();
    setStats(`Generated ${state.points.length} points. Ready to train!`);
  };
  
  /* ---------- drawing ---------- */
  function redraw() {
    bctx.clearRect(0, 0, SZ, SZ);
    bctx.fillStyle = "#0e1420";
    bctx.fillRect(0, 0, SZ, SZ);
    // boundary snapshot
    const snap = state.snapshots[state.current];
    if (snap) {
      offCtx.putImageData(snap.img, 0, 0);
      bctx.save();
      bctx.imageSmoothingEnabled = true;
      bctx.globalAlpha = 0.8;
      bctx.drawImage(off, 0, 0, SZ, SZ);
      bctx.restore();
    }
    // grid
    bctx.strokeStyle = "rgba(140,160,190,0.13)";
    bctx.lineWidth = 1;
    for (let i = 1; i < 8; i++) {
      const t = i / 8 * SZ;
      bctx.beginPath(); bctx.moveTo(t, 0); bctx.lineTo(t, SZ); bctx.stroke();
      bctx.beginPath(); bctx.moveTo(0, t); bctx.lineTo(SZ, t); bctx.stroke();
    }
    // axes
    bctx.strokeStyle = "rgba(140,160,190,0.4)";
    bctx.lineWidth = 1.5;
    bctx.beginPath(); bctx.moveTo(SZ / 2, 0); bctx.lineTo(SZ / 2, SZ); bctx.stroke();
    bctx.beginPath(); bctx.moveTo(0, SZ / 2); bctx.lineTo(SZ, SZ / 2); bctx.stroke();
    // axis labels
    bctx.fillStyle = "rgba(140,160,190,0.55)";
    bctx.font = "11px system-ui";
    bctx.fillText("-1", 6, SZ / 2 + 14);
    bctx.fillText("1", SZ - 14, SZ / 2 + 14);
    bctx.fillText("1", SZ / 2 + 6, 14);
    bctx.fillText("-1", SZ / 2 + 6, SZ - 8);
    // points
    for (const p of state.points) {
      const [px, py] = toPx(p.x, p.y);
      bctx.beginPath();
      bctx.arc(px, py, 5.5, 0, 2 * Math.PI);
      bctx.fillStyle = state.classes[p.c] ? state.classes[p.c].color : "#999";
      bctx.fill();
      bctx.lineWidth = 1.5;
      bctx.strokeStyle = "rgba(0,0,0,0.55)";
      bctx.stroke();
    }
  }
  
  /* render decision boundary of `net` into an ImageData of res×res */
  function boundaryImage(net, res) {
    const img = offCtx.createImageData(res, res);
    const data = img.data;
    const colors = state.classes.map(c => hexToRgb(c.color));
    let k = 0;
    for (let r = 0; r < res; r++) {
      const y = 1 - (r + 0.5) / res * 2;
      for (let ccol = 0; ccol < res; ccol++) {
        const x = (ccol + 0.5) / res * 2 - 1;
        const p = forward(net, x, y).p;
        let R = 0, G = 0, B = 0;
        for (let j = 0; j < p.length; j++) {
          R += p[j] * colors[j][0]; G += p[j] * colors[j][1]; B += p[j] * colors[j][2];
        }
        // dim toward background for softness
        data[k++] = R * 0.55 + 14 * 0.45;
        data[k++] = G * 0.55 + 20 * 0.45;
        data[k++] = B * 0.55 + 32 * 0.45;
        data[k++] = 255;
      }
    }
    return img;
  }
  
  /* ---------- loss chart ---------- */
  function drawChart() {
    const w = chart.width, h = chart.height;
    cctx.clearRect(0, 0, w, h);
    const hist = state.lossHist;
    cctx.font = "10px system-ui";
    if (hist.length < 2) {
      cctx.fillStyle = "rgba(140,160,190,0.5)";
      cctx.fillText("loss / accuracy chart appears here during training", 10, h / 2);
      return;
    }
    let maxLoss = 0;
    for (const e of hist) if (e.loss > maxLoss) maxLoss = e.loss;
    maxLoss = Math.max(maxLoss, 1e-6);
    const px = i => i / (hist.length - 1) * (w - 44) + 4;
    // loss (red-ish)
    cctx.beginPath();
    hist.forEach((e, i) => {
      const y = h - 6 - (e.loss / maxLoss) * (h - 16);
      i ? cctx.lineTo(px(i), y) : cctx.moveTo(px(i), y);
    });
    cctx.strokeStyle = "#f87171"; cctx.lineWidth = 1.6; cctx.stroke();
    // accuracy (green)
    cctx.beginPath();
    hist.forEach((e, i) => {
      const y = h - 6 - e.acc * (h - 16);
      i ? cctx.lineTo(px(i), y) : cctx.moveTo(px(i), y);
    });
    cctx.strokeStyle = "#4ade80"; cctx.lineWidth = 1.6; cctx.stroke();
    // marker for current snapshot
    const snap = state.snapshots[state.current];
    if (snap) {
      const x = px(Math.min(snap.epoch - 1, hist.length - 1));
      cctx.strokeStyle = "rgba(230,236,245,0.45)";
      cctx.setLineDash([3, 3]);
      cctx.beginPath(); cctx.moveTo(x, 0); cctx.lineTo(x, h); cctx.stroke();
      cctx.setLineDash([]);
    }
    // legend
    cctx.fillStyle = "#f87171"; cctx.fillText("loss", w - 36, 12);
    cctx.fillStyle = "#4ade80"; cctx.fillText("acc", w - 36, 24);
  }
  
  function setStats(html) { $("stats").innerHTML = html; }
  
  /* ---------- playback ---------- */
  function showSnapshot(i) {
    if (i < 0 || i >= state.snapshots.length) return;
    state.current = i;
    $("scrub").value = i;
    const s = state.snapshots[i];
    const total = state.lossHist.length;
    $("epochLabel").textContent = `epoch ${s.epoch} / ${total}`;
    redraw();
    drawChart();
  }
  $("scrub").addEventListener("input", e => { stopPlayback(); showSnapshot(+e.target.value); });
  $("playBtn").onclick = () => {
    if (state.playTimer) { stopPlayback(); return; }
    if (!state.snapshots.length) return;
    let i = state.current >= state.snapshots.length - 1 ? 0 : state.current;
    $("playBtn").textContent = "❚❚";
    state.playTimer = setInterval(() => {
      i++;
      if (i >= state.snapshots.length) { stopPlayback(); return; }
      showSnapshot(i);
    }, 70);
  };
  function stopPlayback() {
    if (state.playTimer) clearInterval(state.playTimer);
    state.playTimer = null;
    $("playBtn").textContent = "▶";
  }
  
  /* ---------- training ---------- */
  function readConfig() {
    const hiddenRaw = $("hidden").value.trim();
    let hidden = [];
    if (hiddenRaw) {
      hidden = hiddenRaw.split(/[\s,;]+/).map(Number);
      if (hidden.some(v => !Number.isInteger(v) || v < 1 || v > 256) || hidden.length > 8) {
        throw new Error("Hidden layers must be 1–8 comma-separated integers between 1 and 256 (e.g. 16,16).");
      }
    }
    const epochs = Math.floor(+$("epochs").value);
    const lr = +$("lr").value;
    if (!(epochs >= 1)) throw new Error("Epochs must be ≥ 1.");
    if (!(lr > 0)) throw new Error("Learning rate must be > 0.");
    return {
      hidden,
      activation: $("activation").value,
      seed: Math.floor(+$("seed").value) || 1,
      epochs,
      lr,
      optimizer: $("optimizer").value,
      batch: Math.max(0, Math.floor(+$("batch").value) || 0),
      l2: Math.max(0, +$("l2").value || 0),
      frames: Math.max(2, Math.min(400, Math.floor(+$("frames").value) || 80)),
      res: +$("res").value,
    };
  }
  
  $("trainBtn").onclick = () => {
    if (state.training) return;
    let cfg;
    try { cfg = readConfig(); }
    catch (err) { setStats(`<span style="color:var(--danger)">⚠ ${err.message}</span>`); return; }
    const usedClasses = new Set(state.points.map(p => p.c));
    if (state.points.length < 4 || usedClasses.size < 2) {
      setStats(`<span style="color:var(--danger)">⚠ Add at least a few points from 2+ different classes first.</span>`);
      return;
    }
    runTraining(cfg);
  };
  $("stopBtn").onclick = () => { state.stopFlag = true; };
  
  function runTraining(cfg) {
    const K = state.classes.length;
    const sizes = [2, ...cfg.hidden, K];
    const net = buildNet(sizes, cfg.activation, cfg.seed);
    const g = zerosLike(net);
    const pts = state.points.slice();
    const N = pts.length;
    const batchSize = cfg.batch === 0 ? N : Math.min(cfg.batch, N);
    const order = pts.map((_, i) => i);
    const shuffleRnd = mulberry32(cfg.seed ^ 0x9e3779b9);
    const snapEvery = Math.max(1, Math.ceil(cfg.epochs / cfg.frames));
  
    off.width = cfg.res; off.height = cfg.res;
    state.snapshots = [];
    state.lossHist = [];
    state.current = -1;
    state.training = true;
    state.stopFlag = false;
    stopPlayback();
    $("trainBtn").disabled = true;
    $("stopBtn").disabled = false;
    $("playBtn").disabled = true;
    $("scrub").disabled = true;
  
    let epoch = 0;
  
    function runOneEpoch() {
      // shuffle
      for (let i = N - 1; i > 0; i--) {
        const j = Math.floor(shuffleRnd() * (i + 1));
        [order[i], order[j]] = [order[j], order[i]];
      }
      let lossSum = 0, correct = 0;
      for (let start = 0; start < N; start += batchSize) {
        const end = Math.min(start + batchSize, N);
        for (let k = start; k < end; k++) {
          const p = pts[order[k]];
          const cache = forward(net, p.x, p.y);
          lossSum += -Math.log(Math.max(cache.p[p.c], 1e-12));
          let am = 0;
          for (let j = 1; j < K; j++) if (cache.p[j] > cache.p[am]) am = j;
          if (am === p.c) correct++;
          backward(net, cache, p.c, g);
        }
        applyGrads(net, g, cfg, end - start);
      }
      state.lossHist.push({ loss: lossSum / N, acc: correct / N });
    }
  
    function takeSnapshot() {
      const h = state.lossHist[state.lossHist.length - 1];
      state.snapshots.push({ epoch, img: boundaryImage(net, cfg.res), loss: h.loss, acc: h.acc });
      state.current = state.snapshots.length - 1;
      $("scrub").max = state.snapshots.length - 1;
      $("scrub").value = state.current;
      $("epochLabel").textContent = `epoch ${epoch} / ${cfg.epochs}`;
      redraw();
    }
  
    function tick() {
      const t0 = performance.now();
      while (epoch < cfg.epochs && !state.stopFlag && performance.now() - t0 < 24) {
        runOneEpoch();
        epoch++;
        if (epoch % snapEvery === 0 || epoch === cfg.epochs) takeSnapshot();
      }
      drawChart();
      const h = state.lossHist[state.lossHist.length - 1];
      setStats(`Training… epoch <b>${epoch}</b> / ${cfg.epochs} · loss <b>${h.loss.toFixed(4)}</b> · train acc <b>${(h.acc * 100).toFixed(1)}%</b>`);
      if (epoch < cfg.epochs && !state.stopFlag) {
        requestAnimationFrame(tick);
      } else {
        finish();
      }
    }
  
    function finish() {
      if (state.stopFlag && (state.snapshots.length === 0 || state.snapshots[state.snapshots.length - 1].epoch !== epoch) && epoch > 0) {
        takeSnapshot();
      }
      state.training = false;
      $("trainBtn").disabled = false;
      $("stopBtn").disabled = true;
      if (state.snapshots.length) {
        $("playBtn").disabled = false;
        $("scrub").disabled = false;
      }
      const h = state.lossHist[state.lossHist.length - 1];
      const arch = sizes.join(" → ");
      setStats(
        `${state.stopFlag ? "⏹ Stopped" : "✅ Done"} at epoch <b>${epoch}</b> · ` +
        `loss <b>${h.loss.toFixed(4)}</b> · train acc <b>${(h.acc * 100).toFixed(1)}%</b> · ` +
        `net <b>${arch}</b> (${cfg.activation}, ${cfg.optimizer}) · drag the slider or press ▶ to replay the boundary evolution.`
      );
      drawChart();
    }
  
    setStats("Training…");
    requestAnimationFrame(tick);
  }
  
  /* ---------- init ---------- */
  renderChips();
  redraw();
  drawChart();
  </script>
  </body>
  </html>
